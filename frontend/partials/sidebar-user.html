<script>
  // Highlight active page - Khi nhấn vào trang, chữ chuyển thành màu xanh trên nền trắng
  document.addEventListener('DOMContentLoaded', function() {
    const currentPage = window.location.pathname.split('/').pop() || 'Dashboard.html';
    document.querySelectorAll('.nav-link').forEach(link => {
      const page = link.getAttribute('data-page');
      if (page && currentPage.includes(page)) {
        // Active state: nền trắng, chữ xanh
        link.classList.add('bg-white', 'text-[#004d91]');
        link.classList.remove('text-white/70', 'hover:bg-white/10', 'hover:text-white');
      }
    });
  });

  // Logout functionality
  document.getElementById('logoutBtn')?.addEventListener('click', function() {
    if (window.Auth && typeof window.Auth.logout === 'function') {
      window.Auth.logout();
    } else {
      // Fallback logout
      localStorage.removeItem('auth_token');
      localStorage.removeItem('auth_user');
      window.location.href = 'Login.html';
    }
  });
</script>
