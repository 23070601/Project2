<header class="h-16 w-full bg-surface-container-lowest flex items-center justify-between px-8 z-40 shadow-sm border-b border-outline-variant/10">
  <div class="flex items-center bg-surface-container-low px-4 py-1 rounded-full w-full border border-outline-variant/30 max-w-[400px]">
    <span class="material-symbols-outlined text-outline">search</span>
    <input id="topbarSearch" class="bg-transparent border-none focus:ring-0 text-body-sm font-body-sm w-full placeholder:text-outline-variant" placeholder="Search classrooms, equipment..." type="text">
  </div>
  <div class="flex items-center gap-6">
    <div class="relative">
      <button id="notificationBell" class="relative text-on-surface-variant hover:bg-secondary-container p-2 rounded-full transition-colors">
        <span class="material-symbols-outlined">notifications</span>
        <span id="notificationBadge" class="hidden absolute top-1 right-1 w-2 h-2 bg-error rounded-full"></span>
      </button>
      <div id="notificationDropdown" class="hidden absolute right-0 top-[110%] w-[380px] bg-white border border-outline-variant/30 rounded-xl shadow-lg py-3 z-[100] text-left font-body-sm overflow-hidden">
        <div class="px-4 pb-2 border-b border-outline-variant/10 flex justify-between items-center">
          <span class="text-label-lg font-bold text-on-surface">Notifications</span>
          <button id="markAllReadBtn" class="text-[11px] text-brand-blue font-medium hover:underline">Mark all as read</button>
        </div>
        <div id="notificationList" class="max-h-[300px] overflow-y-auto">
          <!-- Notifications will be loaded here -->
        </div>
        <div class="border-t border-outline-variant/10 mt-1 pt-2">
          <a href="Notification.html" class="text-brand-blue font-label-lg hover:underline block text-center">View All Notifications</a>
        </div>
      </div>
    </div>
    <div class="relative">
      <button class="flex items-center gap-3 pl-3 pr-2 py-1 rounded-full bg-surface-container-low border border-outline-variant/20 hover:bg-surface-container-high transition-colors">
        <div class="text-right flex flex-col">
          <span id="topbarUserName" class="text-label-lg font-bold text-on-surface leading-tight">-</span>
          <span id="topbarUserRole" class="text-[10px] text-on-surface-variant font-medium uppercase tracking-wider">-</span>
        </div>
        <div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center font-bold text-primary" id="topbarUserAvatar">?</div>
      </button>
    </div>
  </div>
</header>

<script>
  // Notification handling
  (function() {
    const notificationBell = document.getElementById('notificationBell');
    const notificationDropdown = document.getElementById('notificationDropdown');
    const notificationList = document.getElementById('notificationList');
    const notificationBadge = document.getElementById('notificationBadge');
    const markAllReadBtn = document.getElementById('markAllReadBtn');

    let notifications = [];
    let isDropdownOpen = false;

    // Sample notifications data
    const sampleNotifications = [
      {
        id: 1,
        title: 'Report REP-0021 status updated',
        message: 'Your report for Air Conditioner Unit in Room 404 has been updated to Pending',
        time: '2 hours ago',
        read: false,
        link: 'ReportDetails.html?id=REP-0021',
        icon: 'schedule',
        iconColor: 'text-brand-blue'
      },
      {
        id: 2,
        title: 'New equipment assigned',
        message: 'Equipment "Digital Projector" has been assigned to your classroom',
        time: '5 hours ago',
        read: false,
        link: 'EquipmentDetails.html?id=1',
        icon: 'build',
        iconColor: 'text-yellow-600'
      },
      {
        id: 3,
        title: 'Report REP-0015 resolved',
        message: 'Your report for Network Switch in Room 505 has been successfully resolved',
        time: 'Yesterday',
        read: true,
        link: 'ReportDetails.html?id=REP-0015',
        icon: 'check_circle',
        iconColor: 'text-green-600'
      },
      {
        id: 4,
        title: 'Maintenance scheduled',
        message: 'Scheduled maintenance for Room 404 on Friday at 2:00 PM',
        time: '2 days ago',
        read: true,
        link: 'Schedule.html',
        icon: 'event',
        iconColor: 'text-purple-600'
      }
    ];

    // Toggle dropdown
    notificationBell.addEventListener('click', function(e) {
      e.stopPropagation();
      isDropdownOpen = !isDropdownOpen;
      if (isDropdownOpen) {
        notificationDropdown.classList.remove('hidden');
        loadNotifications();
      } else {
        notificationDropdown.classList.add('hidden');
      }
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
      if (!notificationDropdown.contains(e.target) && e.target !== notificationBell) {
        notificationDropdown.classList.add('hidden');
        isDropdownOpen = false;
      }
    });

    // Load notifications
    function loadNotifications() {
      // Try to get from API
      try {
        // You can replace this with actual API call
        // const data = await Api.get('/notifications');
        // notifications = data;
        
        // Using sample data for demo
        notifications = sampleNotifications;
        renderNotifications();
        updateBadge();
      } catch (error) {
        console.error('Failed to load notifications:', error);
        notifications = sampleNotifications;
        renderNotifications();
        updateBadge();
      }
    }

    // Render notifications
    function renderNotifications() {
      if (notifications.length === 0) {
        notificationList.innerHTML = `
          <div class="flex flex-col items-center justify-center py-8 px-4">
            <span class="material-symbols-outlined text-4xl text-outline-variant mb-2">notifications_off</span>
            <p class="text-on-surface-variant text-body-sm">No notifications yet</p>
          </div>
        `;
        return;
      }

      notificationList.innerHTML = notifications.map(notif => `
        <a href="${notif.link}" class="flex gap-3 px-4 py-3 hover:bg-surface-container-low transition-colors border-b border-outline-variant/5 ${notif.read ? '' : 'bg-blue-50/30'} group">
          <div class="mt-1 w-8 h-8 rounded-full bg-${notif.iconColor === 'text-brand-blue' ? 'blue' : notif.iconColor === 'text-yellow-600' ? 'yellow' : notif.iconColor === 'text-green-600' ? 'green' : 'purple'}-50 flex items-center justify-center flex-shrink-0">
            <span class="material-symbols-outlined ${notif.iconColor} text-[18px]">${notif.icon}</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-body-sm text-on-surface leading-tight">${notif.title}</p>
            <p class="text-xs text-on-surface-variant mt-0.5 line-clamp-2">${notif.message}</p>
            <p class="text-[10px] text-on-surface-variant mt-1">${notif.time}</p>
          </div>
          ${!notif.read ? `<div class="mt-2 w-2 h-2 bg-brand-blue rounded-full flex-shrink-0"></div>` : ''}
          <div class="opacity-0 group-hover:opacity-100 transition-opacity flex items-center">
            <span class="material-symbols-outlined text-on-surface-variant text-[18px]">chevron_right</span>
          </div>
        </a>
      `).join('');
    }

    // Update notification badge
    function updateBadge() {
      const unreadCount = notifications.filter(n => !n.read).length;
      if (unreadCount > 0) {
        notificationBadge.classList.remove('hidden');
        notificationBadge.textContent = unreadCount > 9 ? '9+' : unreadCount;
        // Add count badge
        notificationBadge.className = 'absolute -top-1 -right-1 w-5 h-5 bg-error text-white text-[10px] font-bold rounded-full flex items-center justify-center';
        notificationBadge.textContent = unreadCount > 9 ? '9+' : unreadCount;
      } else {
        notificationBadge.classList.add('hidden');
        notificationBadge.className = 'hidden absolute top-1 right-1 w-2 h-2 bg-error rounded-full';
      }
    }

    // Mark all as read
    markAllReadBtn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      notifications = notifications.map(n => ({ ...n, read: true }));
      renderNotifications();
      updateBadge();
      
      // Optional: Call API to mark all as read
      // await Api.post('/notifications/mark-all-read');
    });

    // Mark single notification as read when clicked
    notificationList.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link) {
        // Mark as read
        const notificationId = link.dataset.id;
        if (notificationId) {
          const notif = notifications.find(n => n.id == notificationId);
          if (notif && !notif.read) {
            notif.read = true;
            renderNotifications();
            updateBadge();
          }
        }
      }
    });

    // Load notifications on page load
    document.addEventListener('DOMContentLoaded', function() {
      loadNotifications();
    });

  })();
</script>

<style>
  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
</style>
