<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report an Issue - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[220px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8 max-w-[720px]">
    <h1 class="text-headline-lg font-headline-lg text-primary mb-1">Report an Issue</h1>
    <p class="text-on-surface-variant text-body-md mb-6">Describe the problem so we can prioritize and assign a technician quickly.</p>

    <form id="reportForm" class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6 space-y-5">
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant" for="roomSelect">Classroom *</label>
        <select id="roomSelect" required
                class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm focus:ring-2 focus:ring-brand-blue outline-none">
          <option value="">Select a classroom...</option>
        </select>
      </div>

      <div>
        <label class="text-label-md font-label-md text-on-surface-variant" for="assetSelect">Asset (optional)</label>
        <select id="assetSelect"
                class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm focus:ring-2 focus:ring-brand-blue outline-none">
          <option value="">General / not asset-specific</option>
        </select>
      </div>

      <div>
        <label class="text-label-md font-label-md text-on-surface-variant" for="urgencySelect">How urgent is this?</label>
        <select id="urgencySelect"
                class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm focus:ring-2 focus:ring-brand-blue outline-none">
          <option value="Low">Low - can wait</option>
          <option value="Medium" selected>Medium - affects the class</option>
          <option value="High">High - class cannot continue</option>
        </select>
        <p class="text-[11px] text-on-surface-variant mt-1">The system will combine this with the asset's importance to calculate the final priority (DSS1).</p>
      </div>

      <div>
        <label class="text-label-md font-label-md text-on-surface-variant" for="description">Description *</label>
        <textarea id="description" required rows="4"
                  class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm focus:ring-2 focus:ring-brand-blue outline-none"
                  placeholder="e.g. Projector shows no signal, screen stays black."></textarea>
      </div>

      <p id="formError" class="hidden text-error text-body-sm bg-error-container/40 rounded-lg px-3 py-2"></p>
      <p id="formSuccess" class="hidden text-green-700 text-body-sm bg-green-50 rounded-lg px-3 py-2"></p>

      <button id="submitBtn" type="submit"
              class="bg-brand-blue text-white font-label-lg font-label-lg px-6 py-2.5 rounded-lg hover:opacity-90 disabled:opacity-50">
        Submit Report
      </button>
    </form>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script>
  Auth.guard('User');
  Layout.init({ role: 'User', activePage: 'CreateReport' });

  const roomSelect = document.getElementById('roomSelect');
  const assetSelect = document.getElementById('assetSelect');

  async function loadRooms() {
    const rooms = await Api.get('/classrooms');
    roomSelect.innerHTML = '<option value="">Select a classroom...</option>' +
      rooms.map(r => `<option value="${r.room_id}">${r.room_name} (${r.building || ''} - Floor ${r.floor_number ?? '-'})</option>`).join('');

    // Prefill từ QR code: CreateReport.html?room_id=1&room_name=P101
    const params = new URLSearchParams(location.search);
    const prefillRoomId = params.get('room_id');
    if (prefillRoomId) {
      roomSelect.value = prefillRoomId;
      loadAssetsForRoom(prefillRoomId);
    }
  }

  async function loadAssetsForRoom(roomId) {
    assetSelect.innerHTML = '<option value="">General / not asset-specific</option>';
    if (!roomId) return;
    const assets = await Api.get('/assets', { roomId });
    assetSelect.innerHTML += assets.map(a => `<option value="${a.asset_id}">${a.asset_name} (${a.asset_type})</option>`).join('');
  }

  roomSelect.addEventListener('change', () => loadAssetsForRoom(roomSelect.value));

  document.getElementById('reportForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('formError');
    const successBox = document.getElementById('formSuccess');
    const submitBtn = document.getElementById('submitBtn');
    errorBox.classList.add('hidden');
    successBox.classList.add('hidden');
    submitBtn.disabled = true;

    try {
      const report = await Api.post('/fault-reports', {
        roomId: Number(roomSelect.value),
        assetId: assetSelect.value ? Number(assetSelect.value) : undefined,
        description: document.getElementById('description').value.trim(),
        urgencyHint: document.getElementById('urgencySelect').value,
      });
      successBox.textContent = `Report #${report.report_id} submitted successfully with priority: ${report.priority}.`;
      successBox.classList.remove('hidden');
      document.getElementById('reportForm').reset();
      setTimeout(() => location.href = `ReportDetails.html?id=${report.report_id}`, 1200);
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.remove('hidden');
    } finally {
      submitBtn.disabled = false;
    }
  });

  loadRooms().catch(err => console.error('Failed to load rooms', err));
</script>
</body>
</html>
