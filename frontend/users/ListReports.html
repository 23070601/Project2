<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>My Reports - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .bg-brand-blue {
    background-color: #005BAC;
  }
  .text-brand-blue {
    color: #005BAC;
  }
  .hover\:bg-brand-blue-light:hover {
    background-color: #D6EBFF;
  }
  .border-brand-blue {
    border-color: #005BAC;
  }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-x-hidden">

<!-- Sidebar placeholder -->
<div id="sidebar-placeholder"></div>

<div class="flex-1 flex flex-col ml-[240px]">
  <!-- Topbar placeholder -->
  <div id="topbar-placeholder"></div>

  <!-- Main Content -->
  <main class="p-margin-desktop bg-surface min-h-[calc(100vh-60px-40px)] mb-[40px]">
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-headline-lg font-headline-lg text-on-surface">My Reports</h1>
        <p class="text-body-md text-on-surface-variant">Overview and management of all your facility maintenance requests.</p>
      </div>
      <a href="CreateReport.html" class="inline-flex items-center justify-center gap-2 px-6 py-2.5 bg-brand-blue text-white rounded-lg font-label-lg shadow-md hover:opacity-90 transition-all active:scale-95">
        <span class="material-symbols-outlined">add</span>
        <span>Create New Report</span>
      </a>
    </div>

    <!-- Control Row -->
    <div class="bg-surface-container-lowest p-4 rounded-xl shadow-sm mb-6 flex flex-wrap items-center gap-4 border border-outline-variant/30">
      <div class="flex-1 min-w-[300px] relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
        <input id="searchInput" class="w-full pl-10 pr-4 py-2.5 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-body-md" placeholder="Search by Equipment / Room..." type="text">
      </div>
      <div class="flex items-center gap-3">
        <span class="text-label-md text-on-surface-variant">Filter by:</span>
        <select id="statusFilter" class="pl-4 pr-10 py-2.5 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-body-md cursor-pointer appearance-none bg-[url('data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22currentColor%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[length:1.25em_1.25em] bg-[right_0.5rem_center] bg-no-repeat">
          <option value="">All Reports</option>
          <option value="Pending">Pending</option>
          <option value="Pending Approval">Pending Approval</option>
          <option value="Processing">Processing</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
          <option value="Resolved">Resolved</option>
          <option value="Rejected">Rejected</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>
      <button id="advancedFilterBtn" class="p-2.5 border border-outline-variant rounded-lg hover:bg-secondary-container transition-colors text-on-surface-variant flex items-center gap-2">
        <span class="material-symbols-outlined">filter_list</span>
        <span class="text-label-md font-label-md">Advanced</span>
      </button>
    </div>

    <!-- Data Table Card -->
    <div class="bg-white rounded-xl shadow-sm border border-outline-variant/30 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-brand-blue text-white">
              <th class="py-4 px-6 font-label-lg uppercase tracking-wider text-label-md">#</th>
              <th class="py-4 px-6 font-label-lg uppercase tracking-wider text-label-md">Report ID</th>
              <th class="py-4 px-6 font-label-lg uppercase tracking-wider text-label-md">Equipment</th>
              <th class="py-4 px-6 font-label-lg uppercase tracking-wider text-label-md">Room</th>
              <th class="py-4 px-6 font-label-lg uppercase tracking-wider text-label-md">Priority</th>
              <th class="py-4 px-6 font-label-lg uppercase tracking-wider text-label-md">Date</th>
              <th class="py-4 px-6 font-label-lg uppercase tracking-wider text-label-md">Status</th>
              <th class="py-4 px-6 font-label-lg uppercase tracking-wider text-label-md text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="reportsTableBody" class="divide-y divide-outline-variant/20">
            <!-- Data will be loaded dynamically -->
          </tbody>
        </table>
        <p id="emptyState" class="hidden text-center text-on-surface-variant py-8">No reports found.</p>
      </div>
      <!-- Pagination Section -->
      <div class="px-6 py-4 bg-surface-container-low border-t border-outline-variant/30 flex flex-col sm:flex-row items-center justify-between gap-4">
        <p id="paginationInfo" class="text-body-sm text-on-surface-variant">Showing 0 entries</p>
        <nav id="paginationNav" class="flex items-center gap-2">
          <!-- Pagination buttons will be generated -->
        </nav>
      </div>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  // Helper functions
  const priorityBadge = (priority) => {
    const colors = {
      'Low': 'bg-green-100 text-green-800',
      'Medium': 'bg-yellow-100 text-yellow-800',
      'High': 'bg-orange-100 text-orange-800',
      'Critical': 'bg-red-100 text-red-800'
    };
    return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${colors[priority] || 'bg-gray-100 text-gray-800'}">${priority || 'N/A'}</span>`;
  };

  const statusBadge = (status) => {
    const colors = {
      'Pending': 'bg-yellow-100 text-yellow-800',
      'Pending Approval': 'bg-yellow-100 text-yellow-800',
      'Processing': 'bg-blue-100 text-blue-800',
      'In Progress': 'bg-blue-100 text-blue-800',
      'Completed': 'bg-green-100 text-green-800',
      'Resolved': 'bg-green-100 text-green-800',
      'Rejected': 'bg-red-100 text-red-800',
      'Cancelled': 'bg-gray-100 text-gray-800'
    };
    return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${colors[status] || 'bg-gray-100 text-gray-800'}">${status || 'N/A'}</span>`;
  };

  const formatDate = (dateStr) => {
    if (!dateStr) return '-';
    try {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch {
      return dateStr;
    }
  };

  function getFieldValue(obj, fieldNames, defaultValue = 'N/A') {
    for (const field of fieldNames) {
      if (obj[field] !== undefined && obj[field] !== null && obj[field] !== '') {
        return obj[field];
      }
    }
    return defaultValue;
  }

  // Main logic
  (function() {
    // 1. Get user from Auth
    const user = Auth.getCurrentUser();
    if (!user) {
      window.location.href = 'Login.html';
      return;
    }

    // 2. Initialize Layout
    Layout.init({ 
      role: user.role || 'User', 
      activePage: 'ListReports' 
    });

    // 3. State
    let allReports = [];
    let filteredReports = [];
    let currentPage = 1;
    const itemsPerPage = 5;

    // DOM elements
    const tbody = document.getElementById('reportsTableBody');
    const emptyState = document.getElementById('emptyState');
    const paginationInfo = document.getElementById('paginationInfo');
    const paginationNav = document.getElementById('paginationNav');
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');

    // 4. Load reports from API
    async function loadReports() {
      try {
        const reports = await Api.get('/fault-reports', { mine: 'true' });
        console.log('Reports from API:', reports);
        allReports = reports || [];
        applyFilters();
      } catch (err) {
        console.error('Failed to load reports:', err);
        // Fallback mock data
        allReports = [
          { report_id: 'REP-0021', equipment_name: 'Air Conditioner Unit', room_name: 'Room 404', priority: 'High', reported_at: '2026-06-24', status: 'Pending' },
          { report_id: 'REP-0019', equipment_name: 'Digital Projector', room_name: 'Room 602', priority: 'Medium', reported_at: '2026-05-23', status: 'Processing' },
          { report_id: 'REP-0015', equipment_name: 'Network Switch', room_name: 'Room 505', priority: 'Low', reported_at: '2026-04-22', status: 'Completed' },
          { report_id: 'REP-0012', equipment_name: 'Smart Board', room_name: 'Room 401', priority: 'High', reported_at: '2026-03-20', status: 'Rejected' },
          { report_id: 'REP-0010', equipment_name: 'Desktop PC', room_name: 'Room 601', priority: 'Medium', reported_at: '2026-02-18', status: 'Cancelled' }
        ];
        applyFilters();
      }
    }

    // 5. Apply filters
    function applyFilters() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      const statusValue = statusFilter.value;

      filteredReports = allReports.filter(report => {
        // Search filter
        if (searchTerm) {
          const equipment = getFieldValue(report, ['equipment_name', 'equipment', 'asset_name', 'asset']).toLowerCase();
          const room = getFieldValue(report, ['room_name', 'room', 'classroom']).toLowerCase();
          if (!equipment.includes(searchTerm) && !room.includes(searchTerm)) {
            return false;
          }
        }

        // Status filter
        if (statusValue && report.status !== statusValue) {
          return false;
        }

        return true;
      });

      currentPage = 1;
      renderTable();
    }

    // 6. Render table
    function renderTable() {
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = filteredReports.slice(start, end);

      if (filteredReports.length === 0) {
        tbody.innerHTML = '';
        emptyState.classList.remove('hidden');
        paginationInfo.textContent = 'Showing 0 entries';
        paginationNav.innerHTML = '';
        return;
      }
      emptyState.classList.add('hidden');

      // Render rows
      tbody.innerHTML = pageItems.map((r, index) => {
        const equipment = getFieldValue(r, ['equipment_name', 'equipment', 'asset_name', 'asset']);
        const room = getFieldValue(r, ['room_name', 'room', 'classroom']);
        const rowClass = index % 2 === 0 ? 'bg-white' : 'bg-[#EAF5FF]';
        
        return `
          <tr class="${rowClass} hover:bg-[#D6EBFF] transition-colors border-b border-outline-variant/10 cursor-pointer"
              onclick="location.href='ReportDetails.html?id=${r.report_id}'">
            <td class="py-4 px-6 text-body-md">${start + index + 1}</td>
            <td class="py-4 px-6 font-bold text-brand-blue">${r.report_id}</td>
            <td class="py-4 px-6 text-body-md">${equipment}</td>
            <td class="py-4 px-6 text-body-md">${room}</td>
            <td class="py-4 px-6">${priorityBadge(r.priority)}</td>
            <td class="py-4 px-6 text-body-md">${formatDate(r.reported_at)}</td>
            <td class="py-4 px-6">${statusBadge(r.status)}</td>
            <td class="py-4 px-6 text-center">
              <button class="text-brand-blue hover:text-primary-container p-1 rounded-full hover:bg-primary-fixed transition-all" 
                      onclick="event.stopPropagation(); location.href='ReportDetails.html?id=${r.report_id}'">
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </td>
          </tr>
        `;
      }).join('');

      // Update pagination
      const totalPages = Math.ceil(filteredReports.length / itemsPerPage);
      paginationInfo.textContent = `Showing ${start + 1} to ${Math.min(end, filteredReports.length)} of ${filteredReports.length} entries`;

      // Render pagination buttons
      let paginationHTML = '';
      
      // Previous button
      paginationHTML += `
        <button class="w-10 h-10 flex items-center justify-center rounded hover:bg-secondary-container transition-colors disabled:opacity-30" 
                onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>
          <span class="material-symbols-outlined text-body-md">chevron_left</span>
        </button>
      `;

      // Page numbers
      for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
          paginationHTML += `
            <button class="w-10 h-10 rounded bg-brand-blue text-white font-label-lg" onclick="goToPage(${i})">${i}</button>
          `;
        } else if (i <= 3 || i > totalPages - 2 || (i >= currentPage - 1 && i <= currentPage + 1)) {
          paginationHTML += `
            <button class="w-10 h-10 rounded hover:bg-secondary-container text-on-surface transition-colors font-label-lg" onclick="goToPage(${i})">${i}</button>
          `;
        } else if (i === 4 && currentPage > 5) {
          paginationHTML += `<span class="px-2 text-on-surface-variant">...</span>`;
        } else if (i === totalPages - 3 && currentPage < totalPages - 4) {
          paginationHTML += `<span class="px-2 text-on-surface-variant">...</span>`;
        }
      }

      // Next button
      paginationHTML += `
        <button class="w-10 h-10 flex items-center justify-center rounded hover:bg-secondary-container transition-colors disabled:opacity-30" 
                onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>
          <span class="material-symbols-outlined text-body-md">chevron_right</span>
        </button>
      `;

      paginationNav.innerHTML = paginationHTML;
    }

    // 7. Pagination function
    window.goToPage = function(page) {
      const totalPages = Math.ceil(filteredReports.length / itemsPerPage);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
    };

    // 8. Event listeners
    if (searchInput) {
      searchInput.addEventListener('input', applyFilters);
    }

    if (statusFilter) {
      statusFilter.addEventListener('change', applyFilters);
    }

    // 9. Load data
    loadReports().catch(err => console.error('Failed to load reports', err));

  })();
</script>
</body>
</html>
