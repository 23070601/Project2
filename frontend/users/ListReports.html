<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Reports - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[220px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-headline-lg font-headline-lg text-primary">My Reports</h1>
        <p class="text-on-surface-variant text-body-md mt-1">All fault reports you have submitted.</p>
      </div>
      <a href="CreateReport.html" class="bg-brand-blue text-white text-label-lg font-label-lg px-4 py-2 rounded-lg hover:opacity-90">
        + Report an Issue
      </a>
    </div>

    <div class="flex gap-2 mb-4" id="statusFilters">
      <button data-status="" class="filter-btn px-4 py-1.5 rounded-full text-label-md font-label-md border border-outline-variant/40">All</button>
      <button data-status="Pending Approval" class="filter-btn px-4 py-1.5 rounded-full text-label-md font-label-md border border-outline-variant/40">Pending Approval</button>
      <button data-status="Processing" class="filter-btn px-4 py-1.5 rounded-full text-label-md font-label-md border border-outline-variant/40">Processing</button>
      <button data-status="Completed" class="filter-btn px-4 py-1.5 rounded-full text-label-md font-label-md border border-outline-variant/40">Completed</button>
      <button data-status="Rejected" class="filter-btn px-4 py-1.5 rounded-full text-label-md font-label-md border border-outline-variant/40">Rejected</button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
      <table class="w-full text-body-sm">
        <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
          <tr>
            <th class="px-4 py-3">ID</th>
            <th class="px-4 py-3">Room</th>
            <th class="px-4 py-3">Description</th>
            <th class="px-4 py-3">Priority</th>
            <th class="px-4 py-3">Status</th>
            <th class="px-4 py-3">Reported At</th>
          </tr>
        </thead>
        <tbody id="reportsTableBody"></tbody>
      </table>
      <p id="emptyState" class="hidden text-center text-on-surface-variant py-8">No reports found.</p>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  Auth.guard('User');
  Layout.init({ role: 'User', activePage: 'ListReports' });

  let currentStatus = '';

  function setActiveFilterButton() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      const active = btn.dataset.status === currentStatus;
      btn.classList.toggle('bg-brand-blue', active);
      btn.classList.toggle('text-white', active);
      btn.classList.toggle('border-brand-blue', active);
      btn.classList.toggle('text-on-surface-variant', !active);
    });
  }

  async function loadReports() {
    const reports = await Api.get('/fault-reports', { mine: 'true', status: currentStatus || undefined });
    const tbody = document.getElementById('reportsTableBody');
    const emptyState = document.getElementById('emptyState');

    if (reports.length === 0) {
      tbody.innerHTML = '';
      emptyState.classList.remove('hidden');
      return;
    }
    emptyState.classList.add('hidden');

    tbody.innerHTML = reports.map(r => `
      <tr class="border-t border-outline-variant/10 hover:bg-surface-container-low cursor-pointer"
          onclick="location.href='ReportDetails.html?id=${r.report_id}'">
        <td class="px-4 py-3 font-medium">#${r.report_id}</td>
        <td class="px-4 py-3">${r.room_name}</td>
        <td class="px-4 py-3 max-w-[320px] truncate">${UiHelpers.escapeHtml(r.description)}</td>
        <td class="px-4 py-3">${UiHelpers.priorityBadge(r.priority)}</td>
        <td class="px-4 py-3">${UiHelpers.statusBadge(r.status)}</td>
        <td class="px-4 py-3 text-on-surface-variant">${UiHelpers.formatDate(r.reported_at)}</td>
      </tr>
    `).join('');
  }

  document.getElementById('statusFilters').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    currentStatus = btn.dataset.status;
    setActiveFilterButton();
    loadReports().catch(err => console.error(err));
  });

  setActiveFilterButton();
  loadReports().catch(err => console.error('Failed to load reports', err));
</script>
</body>
</html>
