<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Report Details - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .bg-brand-blue {
    background-color: #005BAC;
  }
  .text-brand-blue {
    color: #005BAC;
  }
</style>
</head>
<body class="bg-content-bg text-on-surface font-body-md overflow-x-hidden min-h-screen flex flex-col">

<!-- Sidebar placeholder -->
<div id="sidebar-placeholder"></div>

<!-- Main wrapper -->
<div class="ml-[220px] flex flex-col min-h-screen">
  <!-- Topbar placeholder -->
  <div id="topbar-placeholder"></div>

  <!-- Main Content Area -->
  <main class="flex-1 mt-[60px] mb-[40px] p-8 bg-content-bg min-h-[calc(100vh-100px)]">
    <div class="max-w-6xl mx-auto">
      <!-- Back Button -->
      <a id="backLink" href="ListReports.html" class="text-brand-blue font-label-lg hover:underline mb-4 inline-flex items-center gap-1">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
        Back to List Reports
      </a>

      <!-- Report Details - Dynamic Content -->
      <div id="content">
        <div class="text-center py-8 text-on-surface-variant">Loading report details...</div>
      </div>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  (function() {
    // 1. Get user from Auth
    const user = Auth.getCurrentUser();
    if (!user) {
      window.location.href = 'Login.html';
      return;
    }

    // 2. Initialize Layout
    Layout.init({ 
      role: user.role || 'User', 
      activePage: 'ListReports' 
    });

    // 3. Get report ID from URL
    const reportId = new URLSearchParams(location.search).get('id');
    if (!reportId) {
      document.getElementById('content').innerHTML = '<p class="text-error text-center py-8">No report ID provided</p>';
      return;
    }

    const content = document.getElementById('content');

    // 4. Helper functions
    function priorityBadge(priority) {
      const colors = {
        'Low': 'bg-green-100 text-green-800',
        'Medium': 'bg-yellow-100 text-yellow-800',
        'High': 'bg-orange-100 text-orange-800',
        'Critical': 'bg-red-100 text-red-800'
      };
      return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${colors[priority] || 'bg-gray-100 text-gray-800'}">${priority || 'N/A'}</span>`;
    }

    function statusBadge(status) {
      const colors = {
        'Pending': 'bg-yellow-100 text-yellow-800',
        'Pending Approval': 'bg-yellow-100 text-yellow-800',
        'Processing': 'bg-blue-100 text-blue-800',
        'In Progress': 'bg-blue-100 text-blue-800',
        'Completed': 'bg-green-100 text-green-800',
        'Resolved': 'bg-green-100 text-green-800',
        'Rejected': 'bg-red-100 text-red-800',
        'Cancelled': 'bg-gray-100 text-gray-800',
        'Assigned': 'bg-blue-100 text-blue-800'
      };
      return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${colors[status] || 'bg-gray-100 text-gray-800'}">${status || 'N/A'}</span>`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      try {
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { 
          year: 'numeric', 
          month: 'short', 
          day: 'numeric' 
        });
      } catch {
        return dateStr;
      }
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return '-';
      try {
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { 
          year: 'numeric', 
          month: 'short', 
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      } catch {
        return dateStr;
      }
    }

    function getFieldValue(obj, fieldNames, defaultValue = 'N/A') {
      for (const field of fieldNames) {
        if (obj[field] !== undefined && obj[field] !== null && obj[field] !== '') {
          return obj[field];
        }
      }
      return defaultValue;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 5. Render Report
    function renderReport(report, workOrder, confirmation) {
      const equipment = getFieldValue(report, ['asset_name', 'equipment_name']);
      const room = getFieldValue(report, ['room_name']);
      const history = report.statusHistory || [];

      let html = '';

      // ===== HEADER =====
      html += `
        <div class="flex items-center gap-4 mb-6 flex-wrap">
          <h2 class="text-headline-md font-headline-md text-on-surface">Report Details - ${report.report_id}</h2>
          <div class="flex gap-2 flex-wrap">
            ${statusBadge(report.status)}
            ${priorityBadge(report.priority)}
          </div>
        </div>
      `;

      // ===== 2-COLUMN GRID =====
      html += `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <!-- LEFT COLUMN (2/3) -->
          <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6 space-y-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-y-4 gap-x-8">
                <div>
                  <p class="text-label-md text-on-surface-variant">Equipment</p>
                  <p class="text-body-md font-medium text-on-surface">${equipment || 'N/A'}</p>
                </div>
                <div>
                  <p class="text-label-md text-on-surface-variant">Room</p>
                  <p class="text-body-md font-medium text-on-surface">${room}</p>
                </div>
                <div>
                  <p class="text-label-md text-on-surface-variant">Reported Date</p>
                  <p class="text-body-md font-medium text-on-surface">${formatDate(report.reported_at)}</p>
                </div>
                ${report.reporter_name ? `
                <div>
                  <p class="text-label-md text-on-surface-variant">Reported By</p>
                  <p class="text-body-md font-medium text-on-surface">${escapeHtml(report.reporter_name)}</p>
                </div>
                ` : ''}
              </div>

              <div>
                <p class="text-label-md text-on-surface-variant mb-2">Fault Description</p>
                <div class="bg-surface-container-low p-4 rounded-lg border border-outline-variant/10">
                  <p class="text-body-md text-on-surface whitespace-pre-line">${escapeHtml(report.description)}</p>
                </div>
              </div>

              ${report.image_path ? `
              <div>
                <p class="text-label-md text-on-surface-variant mb-2">Uploaded Evidence</p>
                <div class="flex gap-4">
                  <a href="${report.image_path}" target="_blank" class="w-32 h-32 bg-surface-container rounded-lg border border-outline-variant/10 flex flex-col items-center justify-center text-outline-variant group cursor-pointer hover:border-brand-blue/30 transition-all">
                    <span class="material-symbols-outlined text-[32px]">photo_camera</span>
                    <span class="text-[10px] font-label-md mt-1">View Evidence</span>
                  </a>
                </div>
              </div>
              ` : ''}
            </div>
          </div>

          <!-- RIGHT COLUMN (1/3) -->
          <div class="space-y-6">
            ${workOrder ? renderWorkOrder(workOrder) : ''}
            ${renderTimeline(workOrder)}
            ${renderHistory(history)}
          </div>
        </div>
      `;

      // ===== CONFIRMATION SECTION =====
      if (confirmation) {
        html += renderConfirmationDone(confirmation);
      } else if (workOrder && ['Completed', 'Closed'].includes(workOrder.task_status || workOrder.status)) {
        html += renderConfirmationForm(workOrder.order_id);
      }

      return html;
    }

    // ===== WORK ORDER =====
    function renderWorkOrder(workOrder) {
      const status = workOrder.task_status || workOrder.status;
      
      return `
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6 space-y-4">
          <h3 class="text-label-lg font-bold text-on-surface border-b border-outline-variant/10 pb-2">Work Order Info</h3>
          <div class="space-y-3">
            <div class="flex justify-between items-center p-2 rounded hover:bg-surface-container-low">
              <p class="text-[11px] uppercase tracking-wider text-on-surface-variant font-bold">ID</p>
              <p class="text-body-sm font-medium text-brand-blue">${workOrder.order_id}</p>
            </div>
            <div class="flex justify-between items-center p-2 rounded bg-surface-container-lowest">
              <p class="text-[11px] uppercase tracking-wider text-on-surface-variant font-bold">Technician</p>
              <p class="text-body-sm font-medium">${escapeHtml(workOrder.technician_name || 'N/A')}</p>
            </div>
            <div class="flex justify-between items-center p-2 rounded hover:bg-surface-container-low">
              <p class="text-[11px] uppercase tracking-wider text-on-surface-variant font-bold">Status</p>
              ${statusBadge(status)}
            </div>
            ${workOrder.fix_description ? `
            <div class="p-2 rounded border-t border-outline-variant/5">
              <p class="text-[11px] uppercase tracking-wider text-on-surface-variant font-bold mb-1">Fix Description</p>
              <p class="text-body-sm text-on-surface">${escapeHtml(workOrder.fix_description)}</p>
            </div>
            ` : ''}
            ${workOrder.parts_used ? `
            <div class="p-2 rounded">
              <p class="text-[11px] uppercase tracking-wider text-on-surface-variant font-bold mb-1">Parts Used</p>
              <p class="text-body-sm text-on-surface">${escapeHtml(workOrder.parts_used)}</p>
            </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    // ===== TIMELINE =====
    function renderTimeline(workOrder) {
      if (!workOrder) return '';
      
      return `
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6 space-y-4">
          <h3 class="text-label-lg font-bold text-on-surface border-b border-outline-variant/10 pb-2">Timeline</h3>
          <div class="space-y-3">
            <div class="flex justify-between items-center p-2 rounded bg-surface-container-lowest">
              <p class="text-[11px] uppercase tracking-wider text-on-surface-variant font-bold">Assigned Date</p>
              <p class="text-body-sm font-medium text-on-surface">${formatDate(workOrder.assigned_at)}</p>
            </div>
            ${workOrder.resolved_at ? `
            <div class="flex justify-between items-center p-2 rounded hover:bg-surface-container-low">
              <p class="text-[11px] uppercase tracking-wider text-on-surface-variant font-bold">Resolved Date</p>
              <p class="text-body-sm font-medium text-on-surface">${formatDate(workOrder.resolved_at)}</p>
            </div>
            ` : ''}
          </div>
        </div>
      `;
    }

    // ===== REPAIR HISTORY =====
    function renderHistory(history) {
      if (!history || history.length === 0) {
        return `
          <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6">
            <h3 class="text-label-lg font-bold text-on-surface border-b border-outline-variant/10 pb-2 mb-4">Repair History</h3>
            <p class="text-body-sm text-on-surface-variant text-center py-4">No repair history available</p>
          </div>
        `;
      }
      
      // Lấy 3 item gần nhất hoặc tất cả
      const displayHistory = history.slice(0, 5);
      
      return `
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6">
          <h3 class="text-label-lg font-bold text-on-surface border-b border-outline-variant/10 pb-2 mb-4">Repair History</h3>
          <div class="relative space-y-6 pl-6 before:content-[''] before:absolute before:left-[7px] before:top-2 before:bottom-2 before:w-[2px] before:bg-outline-variant/20">
            ${displayHistory.map((h, index) => {
              const isLatest = index === 0;
              const colors = {
                'Completed': 'bg-green-500',
                'Closed': 'bg-green-500',
                'Resolved': 'bg-green-500',
                'In Progress': 'bg-brand-blue',
                'Processing': 'bg-brand-blue',
                'Received': 'bg-brand-blue',
                'Assigned': 'bg-blue-400',
                'Pending': 'bg-yellow-500',
                'Pending Approval': 'bg-yellow-500',
                'Rejected': 'bg-red-500',
                'Cancelled': 'bg-gray-500'
              };
              const statusText = h.new_status || h.status;
              const color = colors[statusText] || 'bg-outline-variant';
              const note = h.note || '';
              const date = h.changed_at || h.created_at;
              
              return `
                <div class="relative">
                  <div class="absolute -left-[23px] top-1.5 w-4 h-4 rounded-full ${color} border-4 border-white shadow-sm z-10"></div>
                  <p class="text-[12px] font-bold text-on-surface">${formatDate(date)}</p>
                  <p class="text-label-md ${isLatest ? 'text-brand-blue font-bold' : 'text-on-surface-variant'}">Status: ${statusText}</p>
                  ${note ? `<p class="text-label-md text-on-surface-variant mt-1 leading-relaxed">Note: ${escapeHtml(note)}</p>` : ''}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    // ===== CONFIRMATION FORM =====
    function renderConfirmationForm(orderId) {
      return `
        <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-6 shadow-sm mt-6">
          <p class="text-body-md font-medium text-emerald-900 flex items-center gap-2 mb-4">
            <span class="text-[14px]">🟢</span> This issue has been marked as resolved. Please confirm if the problem is fixed.
          </p>
          <form id="confirmForm" class="space-y-4">
            <div class="flex gap-3 flex-wrap">
              <button type="button" onclick="setConfirmation(true)" class="px-6 py-2 bg-brand-blue text-white rounded-lg font-bold text-label-lg hover:bg-primary-container transition-all ring-2 ring-offset-2 ring-brand-blue">
                ✅ Yes, it's fixed
              </button>
              <button type="button" onclick="setConfirmation(false)" class="px-6 py-2 bg-error text-white rounded-lg font-bold text-label-lg hover:opacity-90 transition-all">
                ❌ No, it's not fixed
              </button>
            </div>
            <input type="hidden" id="isConfirmed" value="true">
            
            <div class="pt-4 border-t border-emerald-200/50 space-y-4">
              <div>
                <p class="text-label-md font-bold text-emerald-900 mb-2">Your Rating:</p>
                <div class="flex gap-1" id="ratingStars">
                  ${[1,2,3,4,5].map(i => `
                    <span class="material-symbols-outlined cursor-pointer text-2xl hover:scale-110 transition-transform rating-star text-amber-500" 
                          data-value="${i}" onclick="setRating(${i})"
                          style="font-variation-settings: 'FILL' ${i <= 3 ? 1 : 0}">
                      star
                    </span>
                  `).join('')}
                </div>
                <input type="hidden" id="ratingInput" value="3">
              </div>
              <div>
                <p class="text-label-md font-bold text-emerald-900 mb-2">Feedback Comment:</p>
                <textarea id="feedbackInput" class="w-full bg-white border border-emerald-200 rounded-lg p-3 text-body-sm focus:ring-1 focus:ring-brand-blue outline-none resize-none" rows="3" placeholder="Share your feedback..."></textarea>
              </div>
            </div>
            
            <p id="confirmError" class="hidden text-error text-body-sm bg-error-container/40 rounded-lg px-3 py-2"></p>
            <button type="submit" class="px-8 py-3 bg-brand-blue text-white rounded-lg font-bold text-body-md shadow-lg shadow-brand-blue/20 hover:bg-primary-container transition-all">
              Confirm & Close
            </button>
          </form>
        </div>
      `;
    }

    // ===== CONFIRMATION DONE =====
    function renderConfirmationDone(confirmation) {
      return `
        <div class="bg-green-50 border border-green-200 rounded-xl p-6 shadow-sm mt-6">
          <p class="text-green-800 text-body-md font-medium">
            ${confirmation.is_confirmed ? '✅ You confirmed this repair was successful.' : '⚠️ You reported this issue is still not resolved.'}
          </p>
          ${confirmation.rating ? `<p class="text-body-sm text-green-700 mt-2">Rating: ${'⭐'.repeat(confirmation.rating)}</p>` : ''}
          ${confirmation.feedback ? `<p class="text-body-sm text-green-700 mt-2">"${escapeHtml(confirmation.feedback)}"</p>` : ''}
        </div>
      `;
    }

    // ===== GLOBAL FUNCTIONS =====
    window.setConfirmation = function(value) {
      const input = document.getElementById('isConfirmed');
      if (input) input.value = value;
      const buttons = document.querySelectorAll('#confirmForm .flex.gap-3 button');
      buttons.forEach(btn => {
        btn.classList.remove('ring-2', 'ring-offset-2', 'ring-brand-blue');
      });
      const selectedBtn = value ? buttons[0] : buttons[1];
      if (selectedBtn) {
        selectedBtn.classList.add('ring-2', 'ring-offset-2', 'ring-brand-blue');
      }
    };

    window.setRating = function(value) {
      const input = document.getElementById('ratingInput');
      if (input) input.value = value;
      document.querySelectorAll('.rating-star').forEach(star => {
        const val = parseInt(star.dataset.value);
        if (val <= value) {
          star.style.fontVariationSettings = "'FILL' 1";
        } else {
          star.style.fontVariationSettings = "'FILL' 0";
        }
      });
    };

    // ===== LOAD REPORT =====
    async function loadReport() {
      try {
        // 1. Gọi API lấy report
        const report = await Api.get(`/fault-reports/${reportId}`);
        console.log('Report data:', report);

        let workOrder = null;
        let confirmation = null;

        // 2. Nếu report có order_id, thử lấy work order
        if (report.order_id) {
          try {
            workOrder = await Api.get(`/work-orders/${report.order_id}`);
            console.log('Work order:', workOrder);
          } catch (e) {
            console.warn('Cannot load work order (permission denied or not found):', e.status);
            
            // Tạo workOrder từ dữ liệu có trong report
            workOrder = {
              order_id: report.order_id,
              technician_name: report.technician_name || 'N/A',
              task_status: report.task_status || 'Assigned',
              assigned_at: report.assigned_at || report.reported_at,
              resolved_at: report.resolved_at || null,
              fix_description: report.fix_description || null,
              parts_used: report.parts_used || null
            };
          }
        }

        // 3. Nếu có work order, thử lấy confirmation
        if (report.order_id) {
          try {
            confirmation = await Api.get(`/confirmations/${report.order_id}`);
            console.log('Confirmation:', confirmation);
          } catch (e) {
            if (e.status === 404) {
              console.log('No confirmation found for this work order');
            } else {
              console.warn('Error loading confirmation:', e);
            }
          }
        }

        // 4. Render
        content.innerHTML = renderReport(report, workOrder, confirmation);

        // 5. Setup confirmation form
        const confirmForm = document.getElementById('confirmForm');
        if (confirmForm) {
          setConfirmation(true);
          confirmForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorBox = document.getElementById('confirmError');
            errorBox.classList.add('hidden');
            
            const isConfirmed = document.getElementById('isConfirmed').value === 'true';
            const rating = document.getElementById('ratingInput').value;
            const feedback = document.getElementById('feedbackInput').value.trim();
            
            try {
              await Api.post(`/confirmations/${report.order_id}`, {
                isConfirmed: isConfirmed,
                rating: rating ? Number(rating) : undefined,
                feedback: feedback || undefined,
              });
              loadReport();
            } catch (err) {
              errorBox.textContent = err.message || 'Failed to submit confirmation';
              errorBox.classList.remove('hidden');
            }
          });
        }

      } catch (err) {
        content.innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-xl p-6">
            <p class="text-error text-center">${err.message || 'Failed to load report'}</p>
            <button onclick="loadReport()" class="mt-4 px-4 py-2 bg-brand-blue text-white rounded-lg mx-auto block">
              Retry
            </button>
          </div>
        `;
        console.error('Load report error:', err);
      }
    }

    loadReport();

  })();
</script>
</body>
</html>
