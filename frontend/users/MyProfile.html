<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[220px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8 max-w-[560px]">
    <h1 class="text-headline-lg font-headline-lg text-primary mb-6">My Profile</h1>

    <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6 space-y-4">
      <div class="flex items-center gap-4 mb-2">
        <div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center text-headline-md font-headline-md text-primary" id="avatarBig">?</div>
        <div>
          <p id="profileName" class="text-headline-sm font-headline-sm">-</p>
          <p id="profileRole" class="text-on-surface-variant text-body-sm">-</p>
        </div>
      </div>
      <div class="grid grid-cols-1 gap-3 text-body-sm">
        <div><span class="text-on-surface-variant">Email:</span> <span id="profileEmail">-</span></div>
        <div><span class="text-on-surface-variant">Phone:</span> <span id="profilePhone">-</span></div>
        <div><span class="text-on-surface-variant">Member since:</span> <span id="profileCreatedAt">-</span></div>
      </div>
      <a href="ChangePassword.html" class="inline-block mt-2 text-brand-blue text-label-md font-label-md hover:underline">Change password</a>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  Auth.guard('User');
  Layout.init({ role: 'User', activePage: 'MyProfile' });

  async function loadProfile() {
    const me = await Api.get('/auth/me');
    document.getElementById('profileName').textContent = me.full_name;
    document.getElementById('profileRole').textContent = me.role;
    document.getElementById('profileEmail').textContent = me.email;
    document.getElementById('profilePhone').textContent = me.phone || '-';
    document.getElementById('profileCreatedAt').textContent = UiHelpers.formatDate(me.created_at);
    document.getElementById('avatarBig').textContent = me.full_name.charAt(0).toUpperCase();
  }

  loadProfile().catch(err => console.error(err));
</script>
</body>
</html>
