<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Change Password - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .bg-brand-blue {
    background-color: #005BAC;
  }
  .text-brand-blue {
    color: #005BAC;
  }
</style>
</head>
<body class="bg-content-bg text-on-surface font-body-md overflow-x-hidden min-h-screen flex flex-col">

<!-- Sidebar placeholder -->
<div id="sidebar-placeholder"></div>

<!-- Main wrapper với margin-left cho sidebar -->
<div class="ml-[220px] flex flex-col min-h-screen">
  <!-- Topbar placeholder -->
  <div id="topbar-placeholder"></div>

  <!-- Main Content Area -->
  <main class="flex-1 mt-[60px] mb-[40px] p-8 bg-content-bg min-h-[calc(100vh-100px)]">
    <div class="max-w-3xl mx-auto">
      <!-- CHANGE PASSWORD CARD -->
      <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-8">
        <header class="mb-8">
          <h2 class="text-headline-md text-on-surface font-headline-md mb-2">Change Password</h2>
          <p class="text-body-sm text-on-surface-variant">Choose a strong password to ensure your account security.</p>
        </header>

        <form id="pwForm" class="space-y-6">
          <!-- Current Password -->
          <div class="flex flex-col gap-2">
            <label class="text-label-md font-semibold text-on-surface-variant" for="currentPassword">Current Password</label>
            <input id="currentPassword" type="password" required 
                   class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-3.5 px-4 text-body-md text-on-surface focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue outline-none transition-all" 
                   placeholder="Enter current password">
          </div>

          <!-- New Password -->
          <div class="flex flex-col gap-2">
            <label class="text-label-md font-semibold text-on-surface-variant" for="newPassword">New Password</label>
            <input id="newPassword" type="password" required minlength="6"
                   class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-3.5 px-4 text-body-md text-on-surface focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue outline-none transition-all" 
                   placeholder="Enter new password (min 6 characters)">
            <p class="text-body-sm text-on-surface-variant text-xs">Password must be at least 6 characters long</p>
          </div>

          <!-- Confirm Password -->
          <div class="flex flex-col gap-2">
            <label class="text-label-md font-semibold text-on-surface-variant" for="confirmPassword">Confirm New Password</label>
            <input id="confirmPassword" type="password" required
                   class="w-full bg-surface-container-low border border-outline-variant/30 rounded-lg py-3.5 px-4 text-body-md text-on-surface focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue outline-none transition-all" 
                   placeholder="Confirm your new password">
          </div>

          <!-- Error & Success Messages -->
          <p id="pwError" class="hidden text-error text-body-sm bg-error-container/40 rounded-lg px-3 py-2"></p>
          <p id="pwSuccess" class="hidden text-green-700 text-body-sm bg-green-50 rounded-lg px-3 py-2"></p>

          <!-- Action Button -->
          <button id="submitBtn" type="submit" 
                  class="w-full bg-brand-blue text-white hover:bg-primary-container px-6 py-3 rounded-lg text-label-lg font-bold shadow-md transition-all active:scale-95 mt-2">
            Update Password
          </button>
        </form>
      </div>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  (function() {
    // 1. Get user from Auth
    const user = Auth.getCurrentUser();
    if (!user) {
      window.location.href = 'Login.html';
      return;
    }

    // 2. Initialize Layout
    Layout.init({ 
      role: user.role || 'User', 
      activePage: 'MyProfile' 
    });

    // 3. Handle form submission
    const pwForm = document.getElementById('pwForm');
    const errorBox = document.getElementById('pwError');
    const successBox = document.getElementById('pwSuccess');
    const submitBtn = document.getElementById('submitBtn');

    pwForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Reset messages
      errorBox.classList.add('hidden');
      successBox.classList.add('hidden');
      
      // Get values
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      // Validate
      if (!currentPassword || !newPassword || !confirmPassword) {
        errorBox.textContent = 'All fields are required';
        errorBox.classList.remove('hidden');
        return;
      }
      
      if (newPassword.length < 6) {
        errorBox.textContent = 'New password must be at least 6 characters long';
        errorBox.classList.remove('hidden');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        errorBox.textContent = 'New passwords do not match';
        errorBox.classList.remove('hidden');
        return;
      }
      
      // Disable button
      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';
      
      try {
        // Call API to change password
        await Api.patch('/auth/me/password', {
          currentPassword: currentPassword,
          newPassword: newPassword
        });
        
        // Success
        successBox.textContent = 'Password updated successfully.';
        successBox.classList.remove('hidden');
        pwForm.reset();
        
        // Reset button
        submitBtn.textContent = '✓ Updated';
        submitBtn.classList.remove('bg-brand-blue');
        submitBtn.classList.add('bg-green-600');
        
        setTimeout(() => {
          submitBtn.textContent = 'Update Password';
          submitBtn.classList.remove('bg-green-600');
          submitBtn.classList.add('bg-brand-blue');
          submitBtn.disabled = false;
        }, 3000);
        
      } catch (err) {
        // Handle error
        errorBox.textContent = err.message || 'Failed to update password. Please check your current password.';
        errorBox.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      }
    });

  })();
</script>
</body>
</html>
