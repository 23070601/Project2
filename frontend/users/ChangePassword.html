<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[220px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8 max-w-[480px]">
    <h1 class="text-headline-lg font-headline-lg text-primary mb-6">Change Password</h1>

    <form id="pwForm" class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6 space-y-4">
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Current Password</label>
        <input id="currentPassword" type="password" required class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm">
      </div>
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">New Password</label>
        <input id="newPassword" type="password" required minlength="6" class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm">
      </div>
      <p id="pwError" class="hidden text-error text-body-sm bg-error-container/40 rounded-lg px-3 py-2"></p>
      <p id="pwSuccess" class="hidden text-green-700 text-body-sm bg-green-50 rounded-lg px-3 py-2"></p>
      <button type="submit" class="bg-brand-blue text-white text-label-lg font-label-lg px-5 py-2.5 rounded-lg hover:opacity-90">Update Password</button>
    </form>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script>
  Auth.guard('User');
  Layout.init({ role: 'User', activePage: 'MyProfile' });

  document.getElementById('pwForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('pwError');
    const successBox = document.getElementById('pwSuccess');
    errorBox.classList.add('hidden');
    successBox.classList.add('hidden');
    try {
      await Api.patch('/auth/me/password', {
        currentPassword: document.getElementById('currentPassword').value,
        newPassword: document.getElementById('newPassword').value,
      });
      successBox.textContent = 'Password updated successfully.';
      successBox.classList.remove('hidden');
      document.getElementById('pwForm').reset();
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
