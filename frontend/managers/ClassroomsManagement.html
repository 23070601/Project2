<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classrooms Management - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[240px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-headline-lg font-headline-lg text-primary">Classrooms Management</h1>
        <p class="text-on-surface-variant text-body-md mt-1">Rooms: P101–P114 across floors 1, 4, 5, 6.</p>
      </div>
      <a href="AddClassroom.html" class="bg-brand-blue text-white text-label-lg font-label-lg px-4 py-2 rounded-lg hover:opacity-90">+ Add Classroom</a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
      <table class="w-full text-body-sm">
        <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
          <tr>
            <th class="px-4 py-3">Room</th>
            <th class="px-4 py-3">Building</th>
            <th class="px-4 py-3">Floor</th>
            <th class="px-4 py-3">Assets</th>
            <th class="px-4 py-3">QR Code</th>
          </tr>
        </thead>
        <tbody id="roomsTableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script>
  Auth.guard('Manager');
  Layout.init({ role: 'Manager', activePage: 'ClassroomsManagement' });

  async function loadRooms() {
    const rooms = await Api.get('/classrooms');
    document.getElementById('roomsTableBody').innerHTML = rooms.map(r => `
      <tr class="border-t border-outline-variant/10 hover:bg-surface-container-low cursor-pointer"
          onclick="location.href='ClassroomsDetail.html?id=${r.room_id}'">
        <td class="px-4 py-3 font-medium">${r.room_name}</td>
        <td class="px-4 py-3">${r.building || '-'}</td>
        <td class="px-4 py-3">${r.floor_number ?? '-'}</td>
        <td class="px-4 py-3">${r.asset_count}</td>
        <td class="px-4 py-3">${r.qr_code ? '<span class="text-green-700 text-[11px] font-bold">Generated</span>' : '<span class="text-on-surface-variant text-[11px]">Not yet</span>'}</td>
      </tr>
    `).join('');
  }

  loadRooms().catch(err => console.error(err));
</script>
</body>
</html>
