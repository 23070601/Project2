<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users Management - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[240px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-headline-lg font-headline-lg text-primary">Users Management</h1>
      <a href="AddNewUser.html" class="bg-brand-blue text-white text-label-lg font-label-lg px-4 py-2 rounded-lg hover:opacity-90">+ Add New User</a>
    </div>

    <div class="flex gap-2 mb-4" id="roleFilters">
      <button data-role="" class="filter-btn px-4 py-1.5 rounded-full text-label-md font-label-md border border-outline-variant/40">All</button>
      <button data-role="User" class="filter-btn px-4 py-1.5 rounded-full text-label-md font-label-md border border-outline-variant/40">User</button>
      <button data-role="Technician" class="filter-btn px-4 py-1.5 rounded-full text-label-md font-label-md border border-outline-variant/40">Technician</button>
      <button data-role="Manager" class="filter-btn px-4 py-1.5 rounded-full text-label-md font-label-md border border-outline-variant/40">Manager</button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
      <table class="w-full text-body-sm">
        <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
          <tr><th class="px-4 py-3">Name</th><th class="px-4 py-3">Email</th><th class="px-4 py-3">Role</th><th class="px-4 py-3">Status</th><th class="px-4 py-3"></th></tr>
        </thead>
        <tbody id="usersTableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Edit user modal -->
<div id="editUserModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-[200]">
  <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-[420px]">
    <h3 class="text-headline-sm font-headline-sm mb-4">Edit User</h3>
    <input type="hidden" id="editUserId">
    <div class="space-y-3">
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Full Name</label>
        <input id="editFullName" type="text" class="mt-1 w-full rounded-lg border border-outline-variant/50 px-3 py-2 text-body-sm">
      </div>
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Phone</label>
        <input id="editPhone" type="text" class="mt-1 w-full rounded-lg border border-outline-variant/50 px-3 py-2 text-body-sm">
      </div>
      <div id="editSpecialtyWrap" class="hidden">
        <label class="text-label-md font-label-md text-on-surface-variant">Specialty</label>
        <input id="editSpecialty" type="text" class="mt-1 w-full rounded-lg border border-outline-variant/50 px-3 py-2 text-body-sm">
      </div>
      <label class="flex items-center gap-2 text-body-sm">
        <input type="checkbox" id="editIsActive"> Active
      </label>
    </div>
    <p id="editUserError" class="hidden text-error text-body-sm mt-2"></p>
    <div class="flex justify-end gap-2 mt-4">
      <button id="editUserCancel" class="px-4 py-2 rounded-lg text-label-md font-label-md text-on-surface-variant hover:bg-surface-container-low">Cancel</button>
      <button id="editUserSave" class="px-4 py-2 rounded-lg text-label-md font-label-md bg-brand-blue text-white hover:opacity-90">Save Changes</button>
    </div>
  </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script>
  Auth.guard('Manager');
  Layout.init({ role: 'Manager', activePage: 'UsersManagement' });

  let currentRole = '';
  let usersCache = [];

  function setActiveFilterButton() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      const active = btn.dataset.role === currentRole;
      btn.classList.toggle('bg-brand-blue', active);
      btn.classList.toggle('text-white', active);
      btn.classList.toggle('border-brand-blue', active);
    });
  }

  async function loadUsers() {
    usersCache = await Api.get('/users', { role: currentRole || undefined });
    document.getElementById('usersTableBody').innerHTML = usersCache.map(u => `
      <tr class="border-t border-outline-variant/10">
        <td class="px-4 py-3 font-medium">${u.full_name}</td>
        <td class="px-4 py-3">${u.email}</td>
        <td class="px-4 py-3">${u.role}</td>
        <td class="px-4 py-3">${u.is_active ? '<span class="text-green-700 text-[11px] font-bold">Active</span>' : '<span class="text-error text-[11px] font-bold">Inactive</span>'}</td>
        <td class="px-4 py-3 text-right">
          <button class="edit-user-btn text-brand-blue text-label-md font-label-md hover:underline" data-id="${u.user_id}">Edit</button>
        </td>
      </tr>
    `).join('');

    document.querySelectorAll('.edit-user-btn').forEach(btn => {
      btn.addEventListener('click', () => openEditModal(btn.dataset.id));
    });
  }

  function openEditModal(userId) {
    const u = usersCache.find(x => String(x.user_id) === String(userId));
    if (!u) return;
    document.getElementById('editUserId').value = u.user_id;
    document.getElementById('editFullName').value = u.full_name;
    document.getElementById('editPhone').value = u.phone || '';
    document.getElementById('editIsActive').checked = Boolean(u.is_active);
    const specialtyWrap = document.getElementById('editSpecialtyWrap');
    if (u.role === 'Technician') {
      specialtyWrap.classList.remove('hidden');
      document.getElementById('editSpecialty').value = u.technician_specialty || '';
    } else {
      specialtyWrap.classList.add('hidden');
    }
    document.getElementById('editUserError').classList.add('hidden');
    document.getElementById('editUserModal').classList.remove('hidden');
  }

  document.getElementById('editUserCancel').addEventListener('click', () => {
    document.getElementById('editUserModal').classList.add('hidden');
  });

  document.getElementById('editUserSave').addEventListener('click', async () => {
    const errorBox = document.getElementById('editUserError');
    const userId = document.getElementById('editUserId').value;
    try {
      await Api.patch(`/users/${userId}`, {
        fullName: document.getElementById('editFullName').value.trim(),
        phone: document.getElementById('editPhone').value.trim(),
        technicianSpecialty: document.getElementById('editSpecialty').value.trim() || undefined,
        isActive: document.getElementById('editIsActive').checked,
      });
      document.getElementById('editUserModal').classList.add('hidden');
      loadUsers();
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.remove('hidden');
    }
  });

  document.getElementById('roleFilters').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    currentRole = btn.dataset.role;
    setActiveFilterButton();
    loadUsers().catch(err => console.error(err));
  });

  setActiveFilterButton();
  loadUsers().catch(err => console.error(err));
</script>
</body>
</html>
