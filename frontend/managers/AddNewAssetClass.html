<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add New Asset - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[240px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8 max-w-[480px]">
    <h1 class="text-headline-lg font-headline-lg text-primary mb-6">Add New Asset</h1>

    <form id="addAssetForm" class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6 space-y-4">
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Asset Name *</label>
        <input id="assetName" type="text" required placeholder="e.g. Projector #1"
               class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm">
      </div>
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Asset Type *</label>
        <select id="assetType" required class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm">
          <option value="Projector">Projector</option>
          <option value="Interactive TV">Interactive TV</option>
          <option value="Air Conditioner">Air Conditioner</option>
          <option value="Computer">Computer</option>
          <option value="Speaker">Speaker</option>
          <option value="Microphone">Microphone</option>
        </select>
      </div>
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Classroom *</label>
        <select id="roomSelect" required class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm"></select>
      </div>
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Initial Status</label>
        <select id="status" class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm">
          <option value="Operational" selected>Operational</option>
          <option value="Under Repair">Under Repair</option>
        </select>
      </div>
      <p id="formError" class="hidden text-error text-body-sm bg-error-container/40 rounded-lg px-3 py-2"></p>
      <button type="submit" class="bg-brand-blue text-white text-label-lg font-label-lg px-5 py-2.5 rounded-lg hover:opacity-90">Save Asset</button>
    </form>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script>
  Auth.guard('Manager');
  Layout.init({ role: 'Manager', activePage: 'ClassroomsManagement' });

  const roomSelect = document.getElementById('roomSelect');

  async function loadRooms() {
    const rooms = await Api.get('/classrooms');
    roomSelect.innerHTML = rooms.map(r => `<option value="${r.room_id}">${r.room_name}</option>`).join('');

    const prefillRoomId = new URLSearchParams(location.search).get('room_id');
    if (prefillRoomId) roomSelect.value = prefillRoomId;
  }

  document.getElementById('addAssetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('formError');
    errorBox.classList.add('hidden');
    try {
      const asset = await Api.post('/assets', {
        assetName: document.getElementById('assetName').value.trim(),
        assetType: document.getElementById('assetType').value,
        roomId: Number(roomSelect.value),
        status: document.getElementById('status').value,
      });
      location.href = `ClassroomsDetail.html?id=${asset.room_id}`;
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.remove('hidden');
    }
  });

  loadRooms().catch(err => console.error(err));
</script>
</body>
</html>
