<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add New User - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[240px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8 max-w-[480px]">
    <h1 class="text-headline-lg font-headline-lg text-primary mb-6">Add New User</h1>

    <form id="addUserForm" class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6 space-y-4">
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Full Name *</label>
        <input id="fullName" type="text" required class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm">
      </div>
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Email *</label>
        <input id="email" type="email" required class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm">
      </div>
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Temporary Password *</label>
        <input id="password" type="text" required minlength="6" class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm">
      </div>
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Role *</label>
        <select id="role" class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm">
          <option value="User">User</option>
          <option value="Technician">Technician</option>
          <option value="Manager">Manager</option>
        </select>
      </div>
      <div id="specialtyWrap" class="hidden">
        <label class="text-label-md font-label-md text-on-surface-variant">Specialty</label>
        <input id="technicianSpecialty" type="text" placeholder="e.g. Electrical, HVAC, Software"
               class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm">
      </div>
      <div>
        <label class="text-label-md font-label-md text-on-surface-variant">Phone</label>
        <input id="phone" type="text" class="mt-1 w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm">
      </div>
      <p id="formError" class="hidden text-error text-body-sm bg-error-container/40 rounded-lg px-3 py-2"></p>
      <button type="submit" class="bg-brand-blue text-white text-label-lg font-label-lg px-5 py-2.5 rounded-lg hover:opacity-90">Create User</button>
    </form>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script>
  Auth.guard('Manager');
  Layout.init({ role: 'Manager', activePage: 'UsersManagement' });

  const roleSelect = document.getElementById('role');
  roleSelect.addEventListener('change', () => {
    document.getElementById('specialtyWrap').classList.toggle('hidden', roleSelect.value !== 'Technician');
  });

  document.getElementById('addUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('formError');
    errorBox.classList.add('hidden');
    try {
      await Api.post('/users', {
        fullName: document.getElementById('fullName').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        role: roleSelect.value,
        phone: document.getElementById('phone').value.trim() || undefined,
        technicianSpecialty: document.getElementById('technicianSpecialty').value.trim() || undefined,
      });
      location.href = 'UsersManagement.html';
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.remove('hidden');
    }
  });
</script>
</body>
</html>
