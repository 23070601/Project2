<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom Detail - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[240px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8 max-w-[820px]">
    <a href="ClassroomsManagement.html" class="text-brand-blue text-label-md font-label-md flex items-center gap-1 mb-4 hover:underline">
      <span class="material-symbols-outlined text-[18px]">arrow_back</span> Back to Classrooms
    </a>
    <div id="content" class="space-y-6"></div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  Auth.guard('Manager');
  Layout.init({ role: 'Manager', activePage: 'ClassroomsManagement' });

  const roomId = new URLSearchParams(location.search).get('id');
  const content = document.getElementById('content');

  async function load() {
    const room = await Api.get(`/classrooms/${roomId}`);
    const assets = await Api.get('/assets', { roomId });

    content.innerHTML = `
      <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6">
        <div class="flex items-start justify-between">
          <div>
            <h1 class="text-headline-md font-headline-md text-primary">${room.room_name}</h1>
            <p class="text-on-surface-variant text-body-sm mt-1">${room.building || '-'} · Floor ${room.floor_number ?? '-'}</p>
          </div>
          <a href="GenerateClassQR.html?room_id=${room.room_id}" class="bg-brand-blue text-white text-label-md font-label-md px-4 py-2 rounded-lg hover:opacity-90">Generate QR</a>
        </div>
      </div>

      <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
        <div class="px-6 py-4 border-b border-outline-variant/10 flex items-center justify-between">
          <h2 class="text-headline-sm font-headline-sm">Assets in this room</h2>
          <a href="AddNewAssetClass.html?room_id=${room.room_id}" class="text-brand-blue text-label-md font-label-md hover:underline">+ Add Asset</a>
        </div>
        <table class="w-full text-body-sm">
          <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
            <tr><th class="px-4 py-3">Name</th><th class="px-4 py-3">Type</th><th class="px-4 py-3">Status</th><th class="px-4 py-3">Failures</th></tr>
          </thead>
          <tbody>
            ${assets.map(a => `
              <tr class="border-t border-outline-variant/10 hover:bg-surface-container-low cursor-pointer"
                  onclick="location.href='EditAssetClass.html?id=${a.asset_id}'">
                <td class="px-4 py-3 font-medium">${a.asset_name}</td>
                <td class="px-4 py-3">${a.asset_type}</td>
                <td class="px-4 py-3">${UiHelpers.statusBadge(a.status)}</td>
                <td class="px-4 py-3">${a.failure_count}</td>
              </tr>
            `).join('') || `<tr><td colspan="4" class="px-4 py-6 text-center text-on-surface-variant">No assets registered yet.</td></tr>`}
          </tbody>
        </table>
      </div>
    `;
  }

  load().catch(err => { content.innerHTML = `<p class="text-error">${err.message}</p>`; });
</script>
</body>
</html>
