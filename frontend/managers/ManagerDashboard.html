<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[240px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8">
    <h1 id="welcomeHeading" class="text-headline-lg font-headline-lg text-primary mb-1">Welcome back!</h1>
    <p class="text-on-surface-variant text-body-md mb-6">Facility-wide maintenance overview.</p>

    <!-- 5-card KPI grid -->
    <div class="grid grid-cols-1 sm:grid-cols-5 gap-4 mb-8">
      <div class="bg-white p-5 rounded-xl shadow-sm border border-outline-variant/20">
        <p class="text-on-surface-variant text-label-md">Pending Approval</p>
        <p id="kpiPendingApproval" class="text-headline-lg font-headline-lg text-tertiary mt-1">-</p>
      </div>
      <div class="bg-white p-5 rounded-xl shadow-sm border border-outline-variant/20">
        <p class="text-on-surface-variant text-label-md">Processing</p>
        <p id="kpiProcessing" class="text-headline-lg font-headline-lg text-brand-blue mt-1">-</p>
      </div>
      <div class="bg-white p-5 rounded-xl shadow-sm border border-outline-variant/20">
        <p class="text-on-surface-variant text-label-md">Completed Today</p>
        <p id="kpiCompletedToday" class="text-headline-lg font-headline-lg text-green-600 mt-1">-</p>
      </div>
      <div class="bg-white p-5 rounded-xl shadow-sm border border-outline-variant/20">
        <p class="text-on-surface-variant text-label-md">High Priority Open</p>
        <p id="kpiHighPriority" class="text-headline-lg font-headline-lg text-error mt-1">-</p>
      </div>
      <div class="bg-white p-5 rounded-xl shadow-sm border border-outline-variant/20">
        <p class="text-on-surface-variant text-label-md">Replacement Alerts</p>
        <p id="kpiReplacementAlerts" class="text-headline-lg font-headline-lg text-error mt-1">-</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div>
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-headline-sm font-headline-sm">Pending Requests</h2>
          <a href="PendingRequest.html" class="text-brand-blue text-label-md font-label-md hover:underline">View all →</a>
        </div>
        <div id="pendingList" class="space-y-3"></div>
      </div>

      <div>
        <h2 class="text-headline-sm font-headline-sm mb-4">DSS3 - Replacement Recommendations</h2>
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
          <table class="w-full text-body-sm">
            <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
              <tr><th class="px-4 py-3">Asset</th><th class="px-4 py-3">Room</th><th class="px-4 py-3">Failures</th></tr>
            </thead>
            <tbody id="replacementTableBody"></tbody>
          </table>
          <p id="replacementEmpty" class="hidden text-center text-on-surface-variant py-6 text-body-sm">No assets flagged for replacement.</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  const user = Auth.guard('Manager');
  Layout.init({ role: 'Manager', activePage: 'ManagerDashboard' });
  document.getElementById('welcomeHeading').textContent = `Welcome back, ${user.full_name}!`;

  async function loadDashboard() {
    const kpis = await Api.get('/dashboard/kpis');
    document.getElementById('kpiPendingApproval').textContent = kpis.pendingApproval;
    document.getElementById('kpiProcessing').textContent = kpis.processing;
    document.getElementById('kpiCompletedToday').textContent = kpis.completedToday;
    document.getElementById('kpiHighPriority').textContent = kpis.highPriorityOpen;
    document.getElementById('kpiReplacementAlerts').textContent = kpis.replacementAlerts;

    const pending = await Api.get('/fault-reports', { status: 'Pending Approval' });
    document.getElementById('pendingList').innerHTML = pending.slice(0, 5).map(r => `
      <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-4 cursor-pointer hover:bg-surface-container-low"
           onclick="location.href='PendingRequestDetail.html?id=${r.report_id}'">
        <div class="flex items-center justify-between">
          <p class="text-label-lg font-label-lg">#${r.report_id} · ${r.room_name}</p>
          ${UiHelpers.priorityBadge(r.priority)}
        </div>
        <p class="text-body-sm text-on-surface-variant mt-1 truncate">${UiHelpers.escapeHtml(r.description)}</p>
      </div>
    `).join('') || `<p class="text-on-surface-variant text-body-sm">No pending requests. 🎉</p>`;

    const alerts = await Api.get('/assets/replacement-alerts');
    const tbody = document.getElementById('replacementTableBody');
    if (alerts.length === 0) {
      document.getElementById('replacementEmpty').classList.remove('hidden');
    } else {
      tbody.innerHTML = alerts.map(a => `
        <tr class="border-t border-outline-variant/10">
          <td class="px-4 py-3 font-medium">${a.asset_name}</td>
          <td class="px-4 py-3">${a.room_name}</td>
          <td class="px-4 py-3 text-error font-bold">${a.failure_count}</td>
        </tr>
      `).join('');
    }
  }

  loadDashboard().catch(err => console.error(err));
</script>
</body>
</html>
