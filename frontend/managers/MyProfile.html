<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>My Profile - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<!-- SIDEBAR PLACEHOLDER -->
<div id="sidebar-placeholder"></div>

<!-- MAIN WRAPPER -->
<div class="ml-[240px] flex flex-col min-h-screen">
  <!-- TOP APP BAR PLACEHOLDER -->
  <div id="topbar-placeholder"></div>

  <!-- MAIN CONTENT AREA -->
  <main class="flex-1 overflow-y-auto bg-surface p-8 pb-24">
    <div class="max-w-container-max mx-auto relative">
      <!-- Success Toast -->
      <div id="successToast" class="hidden absolute top-0 right-0 z-50">
        <div class="bg-white border border-outline-variant/20 shadow-lg rounded-xl p-4 flex items-center gap-3 animate-in fade-in slide-in-from-top-4 duration-300">
          <span class="material-symbols-outlined text-green-600">check_circle</span>
          <p class="text-body-sm font-medium text-on-surface">Profile updated successfully!</p>
        </div>
      </div>

      <!-- Page Title -->
      <div class="mb-8">
        <h1 class="text-headline-lg font-headline-lg text-primary">My Profile</h1>
      </div>

      <!-- Grid Layout -->
      <div class="grid grid-cols-1 gap-8">
        <!-- Personal & Contact Info Card -->
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-outline-variant/20 flex flex-col md:flex-row gap-12">
          <!-- Avatar & Badge Column -->
          <div class="flex flex-col items-center shrink-0">
            <div id="profileAvatar" class="w-32 h-32 rounded-full bg-primary-fixed flex items-center justify-center text-primary font-headline-lg text-display-lg mb-4">
              E
            </div>
            <span id="profileRoleBadge" class="px-4 py-1 bg-secondary-container text-on-secondary-container rounded-full text-label-lg font-label-lg tracking-wide">
              Elina
            </span>
          </div>

          <!-- Information Fields Column -->
          <div class="flex-1 space-y-8">
            <!-- Personal Information -->
            <div>
              <h3 class="text-headline-sm font-headline-sm text-on-surface mb-6">Personal Information</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                  <label class="text-label-md font-label-md text-outline">Full Name</label>
                  <div id="profileFullName" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/20 rounded-lg text-body-md text-on-surface-variant">
                    Elina
                  </div>
                </div>
                <div class="space-y-2">
                  <label class="text-label-md font-label-md text-outline">Email Address</label>
                  <div id="profileEmail" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/20 rounded-lg text-body-md text-on-surface-variant">
                    elina@system.com
                  </div>
                </div>
                <div class="space-y-2">
                  <label class="text-label-md font-label-md text-outline">Role</label>
                  <div id="profileRole" class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant/20 rounded-lg text-body-md text-on-surface-variant">
                    Manager
                  </div>
                </div>
              </div>
            </div>

            <!-- Contact Information -->
            <div class="pt-8 border-t border-outline-variant/10">
              <h3 class="text-headline-sm font-headline-sm text-on-surface mb-6">Contact Information</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                <div class="space-y-2">
                  <label class="text-label-md font-label-md text-outline" for="phone">Phone Number</label>
                  <input id="phone" type="text" class="w-full px-4 py-3 bg-white border border-outline-variant/30 rounded-lg text-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" value="+84 912 345 678">
                </div>
                <button id="saveProfileBtn" class="w-fit px-8 py-3 bg-primary-container text-on-primary-container hover:bg-primary hover:text-white font-bold rounded-lg transition-all shadow-sm">
                  Save Changes
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Security Card -->
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-outline-variant/20">
          <h3 class="text-headline-sm font-headline-sm text-on-surface mb-6">Security</h3>
          <div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl border border-outline-variant/10">
            <div class="flex items-center gap-4">
              <span class="material-symbols-outlined text-outline">lock</span>
              <div>
                <p class="text-body-md font-bold text-on-surface">Password</p>
                <p class="text-body-sm text-on-surface-variant">Last changed 3 months ago</p>
              </div>
            </div>
            <button onclick="location.href='ChangePassword.html'" class="px-6 py-2 border border-outline text-on-surface-variant hover:bg-surface-container-high font-bold rounded-lg transition-all">
              Change Password
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER PLACEHOLDER -->
  <div id="footer-placeholder"></div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  let user = { full_name: 'Elina', email: 'elina@system.com', role: 'Manager', phone: '+84 912 345 678' };
  try {
    user = Auth.guard('Manager');
  } catch (e) {
    console.log('Running in demo mode without auth session');
  }

  Layout.init({ role: 'Manager', activePage: 'MyProfile' });

  async function loadProfile() {
    try {
      if (window.Api && window.Auth && Auth.isAuthenticated()) {
        const me = await Api.get('/auth/me');
        if (me) user = { ...user, ...me };
      }
    } catch (err) {
      console.log('Using local user session data for profile view', err);
    }

    const initial = (user.full_name || 'E').charAt(0).toUpperCase();
    document.getElementById('profileAvatar').textContent = initial;
    document.getElementById('profileRoleBadge').textContent = user.full_name || 'Elina';
    document.getElementById('profileFullName').textContent = user.full_name || 'Elina';
    document.getElementById('profileEmail').textContent = user.email || 'elina@system.com';
    document.getElementById('profileRole').textContent = user.role || 'Manager';
    document.getElementById('phone').value = user.phone || '+84 912 345 678';
  }

  document.getElementById('saveProfileBtn').addEventListener('click', async () => {
    const newPhone = document.getElementById('phone').value.trim();
    const btn = document.getElementById('saveProfileBtn');
    const toast = document.getElementById('successToast');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      if (window.Api && window.Auth && Auth.isAuthenticated()) {
        await Api.patch('/users/me/profile', { phone: newPhone });
      }
      user.phone = newPhone;
      localStorage.setItem('vnuis_user', JSON.stringify(user));
      
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    } catch (err) {
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  });

  loadProfile();
</script>
</body>
</html>
