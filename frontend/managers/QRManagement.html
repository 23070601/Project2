<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Management - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[240px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-headline-lg font-headline-lg text-primary">QR Code Management</h1>
        <p class="text-on-surface-variant text-body-md mt-1">All classroom QR codes.</p>
      </div>
      <a href="GenerateClassQR.html" class="bg-brand-blue text-white text-label-lg font-label-lg px-4 py-2 rounded-lg hover:opacity-90">+ Generate New</a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
      <table class="w-full text-body-sm">
        <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
          <tr><th class="px-4 py-3">Room Name</th><th class="px-4 py-3">QR Status</th><th class="px-4 py-3 text-right">Action</th></tr>
        </thead>
        <tbody id="roomsTableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- View QR modal -->
<div id="viewQrModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-[200]">
  <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-[360px] text-center">
    <img id="modalQrImage" class="mx-auto w-[220px] h-[220px]" alt="QR Code">
    <p id="modalRoomName" class="text-label-lg font-label-lg mt-3"></p>
    <div class="flex justify-center gap-2 mt-4">
      <a id="modalDownloadLink" download class="border border-brand-blue text-brand-blue px-4 py-2 rounded-lg text-label-md font-label-md hover:bg-blue-50">Download</a>
      <button id="modalCloseBtn" class="px-4 py-2 rounded-lg text-label-md font-label-md text-on-surface-variant hover:bg-surface-container-low">Close</button>
    </div>
  </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script>
  Auth.guard('Manager');
  Layout.init({ role: 'Manager', activePage: 'QRManagement' });

  async function loadRooms() {
    const rooms = await Api.get('/qrcodes');
    document.getElementById('roomsTableBody').innerHTML = rooms.map(r => `
      <tr class="border-t border-outline-variant/10">
        <td class="px-4 py-3 font-medium text-primary">${r.roomName}</td>
        <td class="px-4 py-3">${r.hasQrCode ? '<span class="bg-green-100 text-green-800 text-xs px-2.5 py-0.5 rounded font-medium">Generated</span>' : '<span class="bg-gray-100 text-gray-700 text-xs px-2.5 py-0.5 rounded font-medium">Not generated</span>'}</td>
        <td class="px-4 py-3 text-right">
          ${r.hasQrCode
            ? `<button class="view-qr-btn text-brand-blue text-label-md font-label-md hover:underline" data-room-id="${r.roomId}">View</button>`
            : `<a href="GenerateClassQR.html?room_id=${r.roomId}" class="text-brand-blue text-label-md font-label-md hover:underline">Generate</a>`}
        </td>
      </tr>
    `).join('');

    document.querySelectorAll('.view-qr-btn').forEach(btn => {
      btn.addEventListener('click', () => viewQr(btn.dataset.roomId));
    });
  }

  async function viewQr(roomId) {
    const result = await Api.get(`/qrcodes/${roomId}`);
    document.getElementById('modalQrImage').src = result.qrImageDataUrl;
    document.getElementById('modalRoomName').textContent = result.roomName;
    document.getElementById('modalDownloadLink').href = result.qrImageDataUrl;
    document.getElementById('modalDownloadLink').download = `QR-${result.roomName}.png`;
    document.getElementById('viewQrModal').classList.remove('hidden');
  }

  document.getElementById('modalCloseBtn').addEventListener('click', () => {
    document.getElementById('viewQrModal').classList.add('hidden');
  });

  loadRooms().catch(err => console.error(err));
</script>
</body>
</html>
