<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports & Analytics - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[240px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8">
    <h1 class="text-headline-lg font-headline-lg text-primary mb-1">Reports &amp; Analytics</h1>
    <p class="text-on-surface-variant text-body-md mb-6">MTTR, asset downtime, and technician workload.</p>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div>
        <h2 class="text-headline-sm font-headline-sm mb-3">Mean Time To Repair (MTTR)</h2>
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
          <table class="w-full text-body-sm">
            <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
              <tr><th class="px-4 py-3">Technician</th><th class="px-4 py-3">Avg. MTTR (hrs)</th><th class="px-4 py-3">Tasks</th></tr>
            </thead>
            <tbody id="mttrTableBody"></tbody>
          </table>
        </div>
      </div>

      <div>
        <h2 class="text-headline-sm font-headline-sm mb-3">Technician Workload (DSS2)</h2>
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
          <table class="w-full text-body-sm">
            <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
              <tr><th class="px-4 py-3">Technician</th><th class="px-4 py-3">Specialty</th><th class="px-4 py-3">Active</th></tr>
            </thead>
            <tbody id="workloadTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="mt-8">
      <h2 class="text-headline-sm font-headline-sm mb-3">Asset Downtime (Top 20)</h2>
      <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
        <table class="w-full text-body-sm">
          <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
            <tr><th class="px-4 py-3">Asset</th><th class="px-4 py-3">Room</th><th class="px-4 py-3">Downtime (hrs)</th></tr>
          </thead>
          <tbody id="downtimeTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script>
  Auth.guard('Manager');
  Layout.init({ role: 'Manager', activePage: 'Report&Analytics' });

  async function loadReports() {
    const [mttr, downtime, workload] = await Promise.all([
      Api.get('/dashboard/mttr'),
      Api.get('/dashboard/downtime'),
      Api.get('/dashboard/technician-workload'),
    ]);

    document.getElementById('mttrTableBody').innerHTML = mttr.map(m => `
      <tr class="border-t border-outline-variant/10">
        <td class="px-4 py-3 font-medium">${m.technician_name}${m.asset_type ? ' · ' + m.asset_type : ''}</td>
        <td class="px-4 py-3">${(Number(m.avg_repair_minutes || 0) / 60).toFixed(1)}</td>
        <td class="px-4 py-3">${m.completed_orders}</td>
      </tr>
    `).join('') || `<tr><td colspan="3" class="px-4 py-6 text-center text-on-surface-variant">No data yet.</td></tr>`;

    document.getElementById('workloadTableBody').innerHTML = workload.map(w => `
      <tr class="border-t border-outline-variant/10">
        <td class="px-4 py-3 font-medium">${w.full_name}</td>
        <td class="px-4 py-3">${w.technician_specialty || '-'}</td>
        <td class="px-4 py-3">${w.active_workload}</td>
      </tr>
    `).join('');

    document.getElementById('downtimeTableBody').innerHTML = downtime.map(d => `
      <tr class="border-t border-outline-variant/10">
        <td class="px-4 py-3 font-medium">${d.asset_name}</td>
        <td class="px-4 py-3">${d.room_name || '-'}</td>
        <td class="px-4 py-3">${Number(d.downtime_hours ?? 0).toFixed(1)}</td>
      </tr>
    `).join('') || `<tr><td colspan="3" class="px-4 py-6 text-center text-on-surface-variant">No data yet.</td></tr>`;
  }

  loadReports().catch(err => console.error(err));
</script>
</body>
</html>
