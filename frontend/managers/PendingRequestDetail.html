<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Detail - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[240px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8 max-w-[820px]">
    <a href="PendingRequest.html" class="text-brand-blue text-label-md font-label-md flex items-center gap-1 mb-4 hover:underline">
      <span class="material-symbols-outlined text-[18px]">arrow_back</span> Back to Requests
    </a>
    <div id="content" class="space-y-6"></div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  Auth.guard('Manager');
  Layout.init({ role: 'Manager', activePage: 'PendingRequest' });

  const reportId = new URLSearchParams(location.search).get('id');
  const content = document.getElementById('content');

  function renderHeader(r) {
    return `
      <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6">
        <div class="flex items-start justify-between">
          <div>
            <h1 class="text-headline-md font-headline-md text-primary">Report #${r.report_id}</h1>
            <p class="text-on-surface-variant text-body-sm mt-1">${r.room_name}${r.asset_name ? ' · ' + r.asset_name : ''} · reported by ${r.reporter_name}</p>
          </div>
          <div class="flex gap-2">${UiHelpers.priorityBadge(r.priority)}${UiHelpers.statusBadge(r.status)}</div>
        </div>
        <p class="text-body-md mt-4 whitespace-pre-line">${UiHelpers.escapeHtml(r.description)}</p>
        <p class="text-on-surface-variant text-body-sm mt-4">Reported at ${UiHelpers.formatDate(r.reported_at)}</p>
      </div>`;
  }

  function renderAssignForm(suggestions) {
    return `
      <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6">
        <h2 class="text-headline-sm font-headline-sm mb-1">Approve &amp; Assign Technician</h2>
        <p class="text-on-surface-variant text-body-sm mb-4">DSS2 suggestion: ranked by specialty match and current workload.</p>

        <div class="space-y-2 mb-5">
          ${suggestions.map((s, i) => `
            <label class="flex items-center justify-between p-3 rounded-lg border ${i === 0 ? 'border-brand-blue bg-blue-50' : 'border-outline-variant/30'} cursor-pointer">
              <div class="flex items-center gap-3">
                <input type="radio" name="technicianId" value="${s.technicianId}" ${i === 0 ? 'checked' : ''}>
                <div>
                  <p class="text-label-lg font-label-lg">${s.fullName} ${i === 0 ? '<span class="text-[10px] text-brand-blue font-bold ml-1">RECOMMENDED</span>' : ''}</p>
                  <p class="text-[11px] text-on-surface-variant">${s.specialty || 'General'} ${s.specialtyMatch ? '· specialty match' : ''}</p>
                </div>
              </div>
              <span class="text-body-sm text-on-surface-variant">${s.activeWorkload} active task(s)</span>
            </label>
          `).join('')}
        </div>

        <p id="assignError" class="hidden text-error text-body-sm bg-error-container/40 rounded-lg px-3 py-2 mb-3"></p>

        <div class="flex gap-3">
          <button id="approveBtn" class="bg-brand-blue text-white text-label-lg font-label-lg px-5 py-2.5 rounded-lg hover:opacity-90">Approve &amp; Assign</button>
          <button id="rejectBtn" class="border border-error text-error text-label-lg font-label-lg px-5 py-2.5 rounded-lg hover:bg-error/5">Reject Report</button>
        </div>
      </div>

      <div id="rejectFormWrap" class="hidden bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6">
        <h2 class="text-headline-sm font-headline-sm mb-3">Reject Report</h2>
        <label class="text-label-md font-label-md text-on-surface-variant">Reason *</label>
        <textarea id="rejectReason" rows="3" class="mt-1 w-full rounded-lg border border-outline-variant/50 px-3 py-2 text-body-sm"
                  placeholder="e.g. Duplicate report, not a facility issue"></textarea>
        <p id="rejectError" class="hidden text-error text-body-sm mt-2"></p>
        <button id="confirmRejectBtn" class="mt-3 bg-error text-white text-label-lg font-label-lg px-5 py-2.5 rounded-lg hover:opacity-90">Confirm Reject</button>
      </div>`;
  }

  async function load() {
    const report = await Api.get(`/fault-reports/${reportId}`);
    let html = renderHeader(report);

    if (report.status === 'Pending Approval') {
      const suggestions = await Api.get(`/work-orders/suggestions/${reportId}`);
      html += renderAssignForm(suggestions);
    } else {
      html += `<div class="bg-surface-container-low rounded-xl p-6 text-body-sm text-on-surface-variant">This report is no longer pending approval.</div>`;
    }

    content.innerHTML = html;

    const approveBtn = document.getElementById('approveBtn');
    if (approveBtn) {
      approveBtn.addEventListener('click', async () => {
        const errorBox = document.getElementById('assignError');
        errorBox.classList.add('hidden');
        const selected = document.querySelector('input[name="technicianId"]:checked');
        if (!selected) return;
        approveBtn.disabled = true;
        try {
          await Api.post('/work-orders', { reportId: Number(reportId), technicianId: Number(selected.value) });
          location.href = 'PendingRequest.html';
        } catch (err) {
          errorBox.textContent = err.message;
          errorBox.classList.remove('hidden');
          approveBtn.disabled = false;
        }
      });
    }

    const rejectBtn = document.getElementById('rejectBtn');
    if (rejectBtn) {
      rejectBtn.addEventListener('click', () => {
        document.getElementById('rejectFormWrap').classList.remove('hidden');
        document.getElementById('rejectFormWrap').scrollIntoView({ behavior: 'smooth' });
      });
    }

    const confirmRejectBtn = document.getElementById('confirmRejectBtn');
    if (confirmRejectBtn) {
      confirmRejectBtn.addEventListener('click', async () => {
        const errorBox = document.getElementById('rejectError');
        const reason = document.getElementById('rejectReason').value.trim();
        if (!reason) {
          errorBox.textContent = 'Please provide a reason.';
          errorBox.classList.remove('hidden');
          return;
        }
        try {
          await Api.patch(`/fault-reports/${reportId}/status`, { status: 'Rejected', rejectionReason: reason });
          location.href = 'PendingRequest.html';
        } catch (err) {
          errorBox.textContent = err.message;
          errorBox.classList.remove('hidden');
        }
      });
    }
  }

  load().catch(err => { content.innerHTML = `<p class="text-error">${err.message}</p>`; });
</script>
</body>
</html>
