<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assigned Tasks - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[220px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8">
    <h1 class="text-headline-lg font-headline-lg text-primary mb-1">Assigned Tasks</h1>
    <p class="text-on-surface-variant text-body-md mb-6">Work orders assigned to you.</p>

    <div id="taskList" class="space-y-4"></div>
    <p id="emptyState" class="hidden text-center text-on-surface-variant py-8">No tasks assigned yet.</p>
  </main>
</div>

<!-- Reject reason modal -->
<div id="rejectModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-[200]">
  <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-[420px]">
    <h3 class="text-headline-sm font-headline-sm mb-3">Reject this task</h3>
    <label class="text-label-md font-label-md text-on-surface-variant">Reason *</label>
    <textarea id="rejectReasonInput" rows="3" required class="mt-1 w-full rounded-lg border border-outline-variant/50 px-3 py-2 text-body-sm"
              placeholder="e.g. Outside my specialty, need HVAC technician"></textarea>
    <p id="rejectModalError" class="hidden text-error text-body-sm mt-2"></p>
    <div class="flex justify-end gap-2 mt-4">
      <button id="rejectModalCancel" class="px-4 py-2 rounded-lg text-label-md font-label-md text-on-surface-variant hover:bg-surface-container-low">Cancel</button>
      <button id="rejectModalConfirm" class="px-4 py-2 rounded-lg text-label-md font-label-md bg-error text-white hover:opacity-90">Confirm Reject</button>
    </div>
  </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  Auth.guard('Technician');
  Layout.init({ role: 'Technician', activePage: 'AssignedTasks' });

  let activeOrderIdForReject = null;

  function renderTaskCard(o) {
    const canRespond = o.technician_response === 'Pending';
    return `
      <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-5">
        <div class="flex items-start justify-between">
          <div class="cursor-pointer" onclick="location.href='WorkOrderDetails.html?id=${o.order_id}'">
            <p class="text-label-lg font-label-lg text-primary">Order #${o.order_id} · ${o.room_name}</p>
            <p class="text-body-sm text-on-surface-variant mt-1 max-w-[500px]">${UiHelpers.escapeHtml(o.description)}</p>
          </div>
          <div class="flex gap-2">${UiHelpers.priorityBadge(o.priority)}${UiHelpers.statusBadge(o.technician_response)}</div>
        </div>
        ${canRespond ? `
          <div class="flex gap-2 mt-4">
            <button class="accept-btn bg-brand-blue text-white text-label-md font-label-md px-4 py-1.5 rounded-lg hover:opacity-90" data-id="${o.order_id}">Accept</button>
            <button class="reject-btn border border-error text-error text-label-md font-label-md px-4 py-1.5 rounded-lg hover:bg-error/5" data-id="${o.order_id}">Reject</button>
          </div>
        ` : `<p class="text-body-sm mt-3 text-on-surface-variant">Task status: ${UiHelpers.statusBadge(o.task_status)}</p>`}
      </div>`;
  }

  async function loadTasks() {
    const orders = await Api.get('/work-orders');
    const list = document.getElementById('taskList');
    const emptyState = document.getElementById('emptyState');

    if (orders.length === 0) {
      list.innerHTML = '';
      emptyState.classList.remove('hidden');
      return;
    }
    emptyState.classList.add('hidden');
    list.innerHTML = orders.map(renderTaskCard).join('');

    document.querySelectorAll('.accept-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        try {
          await Api.patch(`/work-orders/${btn.dataset.id}/response`, { technicianResponse: 'Accepted' });
          loadTasks();
        } catch (err) {
          alert(err.message);
          btn.disabled = false;
        }
      });
    });

    document.querySelectorAll('.reject-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeOrderIdForReject = btn.dataset.id;
        document.getElementById('rejectReasonInput').value = '';
        document.getElementById('rejectModalError').classList.add('hidden');
        document.getElementById('rejectModal').classList.remove('hidden');
      });
    });
  }

  document.getElementById('rejectModalCancel').addEventListener('click', () => {
    document.getElementById('rejectModal').classList.add('hidden');
  });

  document.getElementById('rejectModalConfirm').addEventListener('click', async () => {
    const reason = document.getElementById('rejectReasonInput').value.trim();
    const errorBox = document.getElementById('rejectModalError');
    if (!reason) {
      errorBox.textContent = 'Please provide a reason.';
      errorBox.classList.remove('hidden');
      return;
    }
    try {
      await Api.patch(`/work-orders/${activeOrderIdForReject}/response`, {
        technicianResponse: 'Rejected',
        rejectionReason: reason,
      });
      document.getElementById('rejectModal').classList.add('hidden');
      loadTasks();
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.remove('hidden');
    }
  });

  loadTasks().catch(err => console.error(err));
</script>
</body>
</html>
