<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Order Details - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[220px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8 max-w-[820px]">
    <a href="AssignedTasks.html" class="text-brand-blue text-label-md font-label-md flex items-center gap-1 mb-4 hover:underline">
      <span class="material-symbols-outlined text-[18px]">arrow_back</span> Back to Assigned Tasks
    </a>
    <div id="content" class="space-y-6"></div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  Auth.guard('Technician');
  Layout.init({ role: 'Technician', activePage: 'AssignedTasks' });

  const orderId = new URLSearchParams(location.search).get('id');
  const content = document.getElementById('content');

  // Vòng đời hợp lệ: Assigned -> Received -> In Progress -> Completed -> Closed
  const NEXT_STATUS = {
    Received: 'In Progress',
    'In Progress': 'Completed',
  };
  const NEXT_LABEL = {
    Received: 'Start Working (In Progress)',
    'In Progress': 'Mark as Completed',
  };

  function renderCard(o) {
    const nextStatus = NEXT_STATUS[o.task_status];
    const needsFixDetails = o.task_status === 'In Progress';

    return `
      <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6">
        <div class="flex items-start justify-between">
          <div>
            <h1 class="text-headline-md font-headline-md text-primary">Order #${o.order_id}</h1>
            <p class="text-on-surface-variant text-body-sm mt-1">${o.room_name}${o.asset_name ? ' · ' + o.asset_name : ''}</p>
          </div>
          <div class="flex gap-2">${UiHelpers.priorityBadge(o.priority)}${UiHelpers.statusBadge(o.task_status)}</div>
        </div>
        <p class="text-body-md mt-4 whitespace-pre-line">${UiHelpers.escapeHtml(o.description)}</p>
        <p class="text-body-sm text-on-surface-variant mt-3">Reported by: ${o.reporter_name}</p>
        <p class="text-body-sm text-on-surface-variant">Response: ${UiHelpers.statusBadge(o.technician_response)}</p>
        ${o.rejection_reason ? `<p class="text-body-sm text-error mt-1">Rejection reason: ${UiHelpers.escapeHtml(o.rejection_reason)}</p>` : ''}
      </div>

      ${o.technician_response === 'Accepted' && o.task_status !== 'Closed' ? `
        <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6">
          <h2 class="text-headline-sm font-headline-sm mb-4">Update Progress</h2>
          <form id="progressForm" class="space-y-4">
            ${needsFixDetails ? `
              <div>
                <label class="text-label-md font-label-md text-on-surface-variant">Fix Description</label>
                <textarea id="fixDescription" rows="3" class="mt-1 w-full rounded-lg border border-outline-variant/50 px-3 py-2 text-body-sm"
                          placeholder="Describe what was repaired/replaced...">${o.fix_description || ''}</textarea>
              </div>
              <div>
                <label class="text-label-md font-label-md text-on-surface-variant">Parts Used (optional)</label>
                <input id="partsUsed" type="text" value="${o.parts_used || ''}" class="mt-1 w-full rounded-lg border border-outline-variant/50 px-3 py-2 text-body-sm">
              </div>
            ` : ''}
            <p id="progressError" class="hidden text-error text-body-sm bg-error-container/40 rounded-lg px-3 py-2"></p>
            ${nextStatus ? `<button type="submit" class="bg-brand-blue text-white text-label-lg font-label-lg px-5 py-2.5 rounded-lg hover:opacity-90">${NEXT_LABEL[o.task_status]}</button>` : ''}
          </form>
        </div>
      ` : ''}

      ${renderHistory(o.statusHistory)}
    `;
  }

  function renderHistory(history) {
    if (!history || history.length === 0) return '';
    return `
      <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6">
        <h2 class="text-headline-sm font-headline-sm mb-4">Status History</h2>
        <ol class="space-y-3">
          ${history.map(h => `
            <li class="flex items-start gap-3">
              <span class="material-symbols-outlined text-brand-blue text-[18px] mt-0.5">check_circle</span>
              <div>
                <p class="text-body-sm"><strong>${h.old_status || 'Created'}</strong> → <strong>${h.new_status}</strong></p>
                <p class="text-[11px] text-on-surface-variant">${UiHelpers.formatDate(h.changed_at)}${h.note ? ' · ' + UiHelpers.escapeHtml(h.note) : ''}</p>
              </div>
            </li>`).join('')}
        </ol>
      </div>`;
  }

  let currentOrder = null;

  async function load() {
    currentOrder = await Api.get(`/work-orders/${orderId}`);
    content.innerHTML = renderCard(currentOrder);

    const form = document.getElementById('progressForm');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorBox = document.getElementById('progressError');
        errorBox.classList.add('hidden');
        try {
          const nextStatus = NEXT_STATUS[currentOrder.task_status];
          const body = { taskStatus: nextStatus };
          const fixDescriptionEl = document.getElementById('fixDescription');
          const partsUsedEl = document.getElementById('partsUsed');
          if (fixDescriptionEl) body.fixDescription = fixDescriptionEl.value.trim();
          if (partsUsedEl) body.partsUsed = partsUsedEl.value.trim();

          await Api.patch(`/work-orders/${orderId}/status`, body);
          load();
        } catch (err) {
          errorBox.textContent = err.message;
          errorBox.classList.remove('hidden');
        }
      });
    }
  }

  load().catch(err => {
    content.innerHTML = `<p class="text-error">${err.message}</p>`;
  });
</script>
</body>
</html>
