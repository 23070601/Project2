<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[220px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8 max-w-[720px]">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-headline-lg font-headline-lg text-primary">Notifications</h1>
      <button id="markAllReadPageBtn" class="text-brand-blue text-label-md font-label-md hover:underline">Mark all as read</button>
    </div>
    <div id="notificationFullList" class="bg-white rounded-xl shadow-sm border border-outline-variant/20 divide-y divide-outline-variant/10"></div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script>
  Auth.guard('Technician');
  Layout.init({ role: 'Technician', activePage: 'Notifications' });

  Notifications.loadFullList('#notificationFullList').catch(err => console.error(err));

  document.getElementById('markAllReadPageBtn').addEventListener('click', async () => {
    await Api.patch('/notifications/read-all');
    Notifications.loadFullList('#notificationFullList');
    Notifications.refreshBadge();
  });
</script>
</body>
</html>
