<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[220px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8">
    <h1 id="welcomeHeading" class="text-headline-lg font-headline-lg text-primary mb-1">Welcome back!</h1>
    <p class="text-on-surface-variant text-body-md mb-6">Here is your current workload.</p>

    <div class="grid grid-cols-1 sm:grid-cols-4 gap-6 mb-8">
      <div class="bg-white p-5 rounded-xl shadow-sm border border-outline-variant/20">
        <p class="text-on-surface-variant text-label-md">Pending Response</p>
        <p id="kpiPending" class="text-headline-lg font-headline-lg text-tertiary mt-1">-</p>
      </div>
      <div class="bg-white p-5 rounded-xl shadow-sm border border-outline-variant/20">
        <p class="text-on-surface-variant text-label-md">In Progress</p>
        <p id="kpiInProgress" class="text-headline-lg font-headline-lg text-brand-blue mt-1">-</p>
      </div>
      <div class="bg-white p-5 rounded-xl shadow-sm border border-outline-variant/20">
        <p class="text-on-surface-variant text-label-md">Completed</p>
        <p id="kpiCompleted" class="text-headline-lg font-headline-lg text-green-600 mt-1">-</p>
      </div>
      <div class="bg-white p-5 rounded-xl shadow-sm border border-outline-variant/20">
        <p class="text-on-surface-variant text-label-md">Total Assigned</p>
        <p id="kpiTotal" class="text-headline-lg font-headline-lg text-on-surface mt-1">-</p>
      </div>
    </div>

    <div class="flex items-center justify-between mb-4">
      <h2 class="text-headline-sm font-headline-sm">Latest Assignments</h2>
      <a href="AssignedTasks.html" class="text-brand-blue text-label-md font-label-md hover:underline">View all →</a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
      <table class="w-full text-body-sm">
        <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
          <tr>
            <th class="px-4 py-3">Order</th>
            <th class="px-4 py-3">Room</th>
            <th class="px-4 py-3">Issue</th>
            <th class="px-4 py-3">Priority</th>
            <th class="px-4 py-3">Response</th>
            <th class="px-4 py-3">Status</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  const user = Auth.guard('Technician');
  Layout.init({ role: 'Technician', activePage: 'TechnicianDashboard' });
  document.getElementById('welcomeHeading').textContent = `Welcome back, ${user.full_name}!`;

  async function loadDashboard() {
    const orders = await Api.get('/work-orders');

    document.getElementById('kpiPending').textContent = orders.filter(o => o.technician_response === 'Pending').length;
    document.getElementById('kpiInProgress').textContent = orders.filter(o => ['Received', 'In Progress'].includes(o.task_status)).length;
    document.getElementById('kpiCompleted').textContent = orders.filter(o => ['Completed', 'Closed'].includes(o.task_status)).length;
    document.getElementById('kpiTotal').textContent = orders.length;

    document.getElementById('ordersTableBody').innerHTML = orders.slice(0, 8).map(o => `
      <tr class="border-t border-outline-variant/10 hover:bg-surface-container-low cursor-pointer"
          onclick="location.href='WorkOrderDetails.html?id=${o.order_id}'">
        <td class="px-4 py-3 font-medium">#${o.order_id}</td>
        <td class="px-4 py-3">${o.room_name}</td>
        <td class="px-4 py-3 max-w-[280px] truncate">${UiHelpers.escapeHtml(o.description)}</td>
        <td class="px-4 py-3">${UiHelpers.priorityBadge(o.priority)}</td>
        <td class="px-4 py-3">${UiHelpers.statusBadge(o.technician_response)}</td>
        <td class="px-4 py-3">${UiHelpers.statusBadge(o.task_status)}</td>
      </tr>
    `).join('');
  }

  loadDashboard().catch(err => console.error(err));
</script>
</body>
</html>
