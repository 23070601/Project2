<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assets - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[240px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8">
    <h1 class="text-headline-lg font-headline-lg text-primary mb-1">Assets</h1>
    <p class="text-on-surface-variant text-body-md mb-6">All classroom equipment.</p>

    <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
      <table class="w-full text-body-sm">
        <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
          <tr>
            <th class="px-4 py-3">Name</th>
            <th class="px-4 py-3">Type</th>
            <th class="px-4 py-3">Room</th>
            <th class="px-4 py-3">Status</th>
            <th class="px-4 py-3">Failures</th>
          </tr>
        </thead>
        <tbody id="assetsTableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  Auth.guard('Technician');
  Layout.init({ role: 'Technician', activePage: 'AssetList' });

  async function loadAssets() {
    const assets = await Api.get('/assets');
    document.getElementById('assetsTableBody').innerHTML = assets.map(a => `
      <tr class="border-t border-outline-variant/10 hover:bg-surface-container-low cursor-pointer"
          onclick="location.href='AssetDetails.html?id=${a.asset_id}'">
        <td class="px-4 py-3 font-medium">${a.asset_name}</td>
        <td class="px-4 py-3">${a.asset_type}</td>
        <td class="px-4 py-3">${a.room_name}</td>
        <td class="px-4 py-3">${UiHelpers.statusBadge(a.status)}</td>
        <td class="px-4 py-3">${a.failure_count}</td>
      </tr>
    `).join('');
  }

  loadAssets().catch(err => console.error(err));
</script>
</body>
</html>
