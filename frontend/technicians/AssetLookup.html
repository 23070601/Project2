<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Lookup - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[220px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8">
    <h1 class="text-headline-lg font-headline-lg text-primary mb-1">QR / Asset Lookup</h1>
    <p class="text-on-surface-variant text-body-md mb-6">Search by room name or asset name (or scan a classroom QR code, which opens this page with a room pre-filled).</p>

    <div class="max-w-[420px] mb-6">
      <input id="searchInput" type="text" placeholder="e.g. P101 or Projector"
             class="w-full rounded-lg border border-outline-variant/50 px-4 py-2.5 text-body-sm focus:ring-2 focus:ring-brand-blue outline-none">
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 overflow-hidden">
      <table class="w-full text-body-sm">
        <thead class="bg-surface-container-low text-on-surface-variant text-label-md text-left">
          <tr>
            <th class="px-4 py-3">Name</th>
            <th class="px-4 py-3">Type</th>
            <th class="px-4 py-3">Room</th>
            <th class="px-4 py-3">Status</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
      <p id="emptyState" class="hidden text-center text-on-surface-variant py-8">No matching assets. Try a different search term.</p>
    </div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  Auth.guard('Technician');
  Layout.init({ role: 'Technician', activePage: 'AssetLookup' });

  const searchInput = document.getElementById('searchInput');
  let debounceTimer = null;

  async function search(term) {
    const assets = await Api.get('/assets', { search: term || undefined });
    const tbody = document.getElementById('resultsBody');
    const emptyState = document.getElementById('emptyState');

    if (assets.length === 0) {
      tbody.innerHTML = '';
      emptyState.classList.remove('hidden');
      return;
    }
    emptyState.classList.add('hidden');
    tbody.innerHTML = assets.map(a => `
      <tr class="border-t border-outline-variant/10 hover:bg-surface-container-low cursor-pointer"
          onclick="location.href='AssetDetails.html?id=${a.asset_id}'">
        <td class="px-4 py-3 font-medium">${a.asset_name}</td>
        <td class="px-4 py-3">${a.asset_type}</td>
        <td class="px-4 py-3">${a.room_name}</td>
        <td class="px-4 py-3">${UiHelpers.statusBadge(a.status)}</td>
      </tr>
    `).join('');
  }

  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => search(searchInput.value.trim()), 300);
  });

  // Prefill từ QR: AssetLookup.html?room_name=P101
  const params = new URLSearchParams(location.search);
  const prefillRoomName = params.get('room_name');
  if (prefillRoomName) searchInput.value = prefillRoomName;

  search(searchInput.value.trim()).catch(err => console.error(err));
</script>
</body>
</html>
