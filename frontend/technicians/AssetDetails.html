<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Details - VNU-IS Asset Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="../assets/js/theme.config.js"></script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-surface text-on-surface overflow-x-hidden">

<div id="sidebar-placeholder"></div>

<div class="ml-[240px] flex flex-col min-h-screen">
  <div id="topbar-placeholder"></div>

  <main class="flex-1 p-8 max-w-[640px]">
    <a href="AssetList.html" class="text-brand-blue text-label-md font-label-md flex items-center gap-1 mb-4 hover:underline">
      <span class="material-symbols-outlined text-[18px]">arrow_back</span> Back to Assets
    </a>
    <div id="content"></div>
  </main>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/notifications.js"></script>
<script src="../assets/js/ui-helpers.js"></script>
<script>
  Auth.guard('Technician');
  Layout.init({ role: 'Technician', activePage: 'AssetList' });

  const assetId = new URLSearchParams(location.search).get('id');
  const content = document.getElementById('content');
  const STATUS_OPTIONS = ['Operational', 'Under Repair', 'Recommended for Replacement', 'Retired'];

  function render(a) {
    content.innerHTML = `
      <div class="bg-white rounded-xl shadow-sm border border-outline-variant/20 p-6">
        <div class="flex items-start justify-between">
          <div>
            <h1 class="text-headline-md font-headline-md text-primary">${a.asset_name}</h1>
            <p class="text-on-surface-variant text-body-sm mt-1">${a.asset_type} · ${a.room_name} (${a.building || '-'})</p>
          </div>
          ${UiHelpers.statusBadge(a.status)}
        </div>
        <div class="grid grid-cols-2 gap-4 mt-5 text-body-sm">
          <div><span class="text-on-surface-variant">Failure count:</span> <strong>${a.failure_count}</strong></div>
          <div><span class="text-on-surface-variant">Last fault at:</span> ${UiHelpers.formatDate(a.last_fault_at)}</div>
        </div>

        <div class="mt-6">
          <label class="text-label-md font-label-md text-on-surface-variant">Update status</label>
          <div class="flex gap-2 mt-2">
            <select id="statusSelect" class="rounded-lg border border-outline-variant/50 px-3 py-2 text-body-sm">
              ${STATUS_OPTIONS.map(s => `<option value="${s}" ${s === a.status ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
            <button id="updateStatusBtn" class="bg-brand-blue text-white text-label-md font-label-md px-4 py-2 rounded-lg hover:opacity-90">Update</button>
          </div>
          <p id="updateError" class="hidden text-error text-body-sm mt-2"></p>
        </div>
      </div>`;

    document.getElementById('updateStatusBtn').addEventListener('click', async () => {
      const errorBox = document.getElementById('updateError');
      errorBox.classList.add('hidden');
      try {
        await Api.patch(`/assets/${assetId}`, { status: document.getElementById('statusSelect').value });
        load();
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
      }
    });
  }

  async function load() {
    const asset = await Api.get(`/assets/${assetId}`);
    render(asset);
  }

  load().catch(err => { content.innerHTML = `<p class="text-error">${err.message}</p>`; });
</script>
</body>
</html>
